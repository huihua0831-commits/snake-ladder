<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職場華語（二）紀錄與報告任務蛇梯遊戲</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: #eef2f7;
      color: #1f2937;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(560px, 2fr) minmax(320px, 1fr);
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      padding: 18px;
    }

    .game-panel {
      min-height: 720px;
    }

    .board {
      width: 509px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 100px);
      grid-template-rows: repeat(5, 100px);
      gap: 2px;
      background: #334155;
      padding: 2px;
      border-radius: 14px;
      overflow: hidden;
    }

    .cell {
      background: #ffffff;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px;
      text-align: left;
    }

    .cell-number {
      font-weight: 800;
      font-size: 18px;
    }

    .cell-icon {
      align-self: center;
      font-size: 26px;
      line-height: 1;
      margin-top: 2px;
    }

    .cell-label {
      font-size: 12px;
      color: #475569;
      line-height: 1.25;
      min-height: 28px;
    }

    .start-cell { background: #dbeafe; }
    .finish-cell { background: #ede9fe; }
    .question-cell { background: #fefce8; }
    .ladder-cell { background: #dcfce7; }
    .snake-cell { background: #fee2e2; }
    .special-cell { background: #e0f2fe; }
    .free-cell { background: #f8fafc; }

    .token-wrap {
      position: absolute;
      right: 6px;
      bottom: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
      max-width: 60px;
    }

    .token {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }

    .p1 { background: #ef4444; }
    .p2 { background: #3b82f6; }
    .p3 { background: #22c55e; }
    .p4 { background: #f59e0b; }

    .legend {
      margin-top: 16px;
      text-align: left;
      font-size: 14px;
      line-height: 1.9;
      color: #475569;
    }

    .legend span {
      display: inline-block;
      margin-right: 14px;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      text-align: left;
    }

    .card h2, .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    select, input, button {
      font: inherit;
      border-radius: 10px;
    }

    select, input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      background: white;
    }

    .name-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      padding: 10px 16px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #64748b;
    }

    button.secondary:hover {
      background: #475569;
    }

    button.success {
      background: #16a34a;
    }

    button.success:hover {
      background: #15803d;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    .big {
      font-size: 28px;
      font-weight: 800;
    }

    .status-list {
      display: grid;
      gap: 8px;
    }

    .status-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .log {
      max-height: 260px;
      overflow-y: auto;
      display: grid;
      gap: 8px;
    }

    .log-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s ease;
      padding: 16px;
      z-index: 1000;
    }

    .modal.show {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 560px;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    }

    .modal-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 800;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .modal-subtitle {
      font-size: 16px;
      color: #475569;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .modal-dice {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .modal-text {
      font-size: 20px;
      line-height: 1.7;
      margin-bottom: 14px;
      white-space: pre-line;
    }

    .modal-note {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px;
      color: #475569;
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 16px;
      text-align: left;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 1100px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .name-grid {
        grid-template-columns: 1fr;
      }

      .board {
        width: 100%;
        max-width: 509px;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(5, 1fr);
        aspect-ratio: 1 / 1;
      }

      .cell {
        min-width: 0;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <h1>職場華語（二）紀錄與報告任務蛇梯遊戲</h1>
  <div class="subtitle">
    5×5 任務蛇梯遊戲｜回答問題 × emoji 蛇梯 × 任務跳窗
  </div>

  <div class="container">
    <section class="panel game-panel">
      <div id="board" class="board"></div>

      <div class="legend">
        <span>🪜 梯子格</span>
        <span>🐍 蛇格</span>
        <span>🎯 問題格</span>
        <span>🎲 特殊移動格</span>
        <span>☁️ 自由格</span>
      </div>
    </section>

    <section class="panel">
      <div class="card">
        <h2>遊戲設定</h2>

        <label for="playerCount">玩家人數</label>
        <select id="playerCount">
          <option value="1">1 人</option>
          <option value="2" selected>2 人</option>
          <option value="3">3 人</option>
          <option value="4">4 人</option>
        </select>

        <div class="name-grid">
          <div>
            <label for="player1Name">玩家1姓名</label>
            <input id="player1Name" type="text" value="學生1" />
          </div>
          <div>
            <label for="player2Name">玩家2姓名</label>
            <input id="player2Name" type="text" value="學生2" />
          </div>
          <div>
            <label for="player3Name">玩家3姓名</label>
            <input id="player3Name" type="text" value="學生3" />
          </div>
          <div>
            <label for="player4Name">玩家4姓名</label>
            <input id="player4Name" type="text" value="學生4" />
          </div>
        </div>

        <div class="controls-row">
          <button id="startBtn">開始遊戲</button>
          <button id="resetBtn" class="secondary">重新開始</button>
        </div>
      </div>

      <div class="card">
        <h3>目前回合</h3>
        <div>現在輪到：<span id="playerTurn" class="big">-</span></div>
        <div style="margin-top:10px;">骰子：<span id="dice" class="big">🎲</span></div>

        <div class="controls-row">
          <button id="rollBtn">擲骰子</button>
        </div>
      </div>

      <div class="card">
        <h3>玩家位置</h3>
        <div id="status" class="status-list"></div>
      </div>

      <div class="card">
        <h3>遊戲紀錄</h3>
        <div id="log" class="log"></div>
      </div>
    </section>
  </div>

  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div id="modalBadge" class="modal-badge">任務</div>
      <div id="modalTitle" class="modal-title">題目</div>
      <div id="modalSubtitle" class="modal-subtitle"></div>
      <div id="modalDice" class="modal-dice">🎲</div>
      <div id="modalText" class="modal-text"></div>
      <div id="modalNote" class="modal-note"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>

  <script>
    const boardOrder = [
      21,22,23,24,25,
      20,19,18,17,16,
      11,12,13,14,15,
      10,9,8,7,6,
      1,2,3,4,5
    ];

    const questionMap = {
      2: "車禍是什麼時候發生的？",
      4: "車禍大概幾點發生？",
      5: "車禍是在哪裡發生的？",
      7: "車禍是在中山路和和平路的路口發生的嗎？",
      9: "你騎機車還是開車？對方呢？",
      11: "你的車號是多少？",
      13: "對方的車號是多少？",
      15: "車禍是怎麼發生的？",
      17: "你那個時候要直走、右轉還是左轉？",
      18: "對方的車是從哪裡來的？",
      21: "有人受傷嗎？",
      22: "車子有損壞嗎？",
      24: "事故發生以後，你做了什麼？"
    };

    const ladders = {
      3: 8,
      8: 14,
      14: 20
    };

    const snakes = {
      12: 6,
      19: 10,
      23: 16
    };

    const specials = {
      6: { type: "rollAgain", label: "🎲 再擲一次", text: "你抽到特殊格：再擲一次。", note: "這一回合不用換下一位，回答完後可再擲一次。" },
      10: { type: "forward2", label: "🎲 前進兩格", text: "你抽到特殊格：前進兩格。", note: "系統會自動幫你前進兩格。" },
      16: { type: "back1", label: "🎲 後退一格", text: "你抽到特殊格：後退一格。", note: "系統會自動幫你後退一格。" },
      20: { type: "dialogue", label: "🎲 對話任務", text: "請和同學用兩句話做簡短對話。", note: "完成對話後，再按下方按鈕。" }
    };

    const boardEl = document.getElementById("board");
    const playerTurnEl = document.getElementById("playerTurn");
    const diceEl = document.getElementById("dice");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const playerCountEl = document.getElementById("playerCount");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const rollBtn = document.getElementById("rollBtn");

    const playerNameInputs = [
      document.getElementById("player1Name"),
      document.getElementById("player2Name"),
      document.getElementById("player3Name"),
      document.getElementById("player4Name")
    ];

    const taskModal = document.getElementById("taskModal");
    const modalBadge = document.getElementById("modalBadge");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalDice = document.getElementById("modalDice");
    const modalText = document.getElementById("modalText");
    const modalNote = document.getElementById("modalNote");
    const modalActions = document.getElementById("modalActions");

    const playerColors = ["p1", "p2", "p3", "p4"];

    let players = [];
    let currentPlayer = 0;
    let gameStarted = false;
    let waitingModalClose = false;
    let gameOver = false;

    function updateNameInputs() {
      const count = Number(playerCountEl.value);
      playerNameInputs.forEach((input, index) => {
        input.disabled = index >= count;
        input.parentElement.style.opacity = index >= count ? "0.45" : "1";
      });
    }

    function getCellType(num) {
      if (num === 1) return "start";
      if (num === 25) return "finish";
      if (questionMap[num]) return "question";
      if (ladders[num]) return "ladder";
      if (snakes[num]) return "snake";
      if (specials[num]) return "special";
      return "free";
    }

    function getCellDisplay(num) {
      if (num === 1) return { icon: "🚩", label: "起點" };
      if (num === 25) return { icon: "🏁", label: "終點" };
      if (questionMap[num]) return { icon: "🎯", label: "回答問題" };
      if (ladders[num]) return { icon: "🪜", label: `${num} → ${ladders[num]}` };
      if (snakes[num]) return { icon: "🐍", label: `${num} → ${snakes[num]}` };
      if (specials[num]) return { icon: "🎲", label: specials[num].label.replace("🎲 ", "") };
      return { icon: "☁️", label: "自由格" };
    }

    function createBoard() {
      boardEl.innerHTML = "";
      boardOrder.forEach(num => {
        const type = getCellType(num);
        const display = getCellDisplay(num);
        const cell = document.createElement("div");

        cell.className = `cell ${
          type === "start" ? "start-cell" :
          type === "finish" ? "finish-cell" :
          type === "question" ? "question-cell" :
          type === "ladder" ? "ladder-cell" :
          type === "snake" ? "snake-cell" :
          type === "special" ? "special-cell" : "free-cell"
        }`;
        cell.dataset.num = num;

        cell.innerHTML = `
          <div class="cell-number">${num}</div>
          <div class="cell-icon">${display.icon}</div>
          <div class="cell-label">${display.label}</div>
          <div class="token-wrap"></div>
        `;

        boardEl.appendChild(cell);
      });
    }

    function createPlayers() {
      const count = Number(playerCountEl.value);
      players = [];

      for (let i = 0; i < count; i++) {
        const inputName = playerNameInputs[i].value.trim();
        players.push({
          name: inputName || `玩家${i + 1}`,
          pos: 1,
          color: playerColors[i]
        });
      }
    }

    function renderTokens() {
      document.querySelectorAll(".token-wrap").forEach(wrap => {
        wrap.innerHTML = "";
      });

      players.forEach(player => {
        const cell = [...document.querySelectorAll(".cell")].find(c => Number(c.dataset.num) === player.pos);
        if (!cell) return;
        const wrap = cell.querySelector(".token-wrap");
        const token = document.createElement("div");
        token.className = `token ${player.color}`;
        wrap.appendChild(token);
      });
    }

    function updateStatus() {
      statusEl.innerHTML = "";
      players.forEach((player, index) => {
        const div = document.createElement("div");
        div.className = "status-item";
        div.innerHTML = `<strong>${player.name}</strong>：第 ${player.pos} 格 ${index === currentPlayer && !gameOver ? "（目前回合）" : ""}`;
        statusEl.appendChild(div);
      });
    }

    function updateTurnText() {
      playerTurnEl.textContent = gameOver ? "遊戲結束" : (players[currentPlayer]?.name || "-");
    }

    function addLog(text) {
      const item = document.createElement("div");
      item.className = "log-item";
      item.textContent = text;
      logEl.prepend(item);
    }

    function showModal({ badge, title, subtitle, dice, text, note, actions }) {
      modalBadge.textContent = badge || "任務";
      modalTitle.textContent = title || "";
      modalSubtitle.textContent = subtitle || "";
      modalDice.textContent = dice || "🎲";
      modalText.textContent = text || "";
      modalNote.textContent = note || "";
      modalActions.innerHTML = "";

      actions.forEach(action => {
        const btn = document.createElement("button");
        btn.textContent = action.label;
        if (action.className) btn.className = action.className;
        btn.addEventListener("click", action.onClick);
        modalActions.appendChild(btn);
      });

      taskModal.classList.add("show");
      waitingModalClose = true;
    }

    function closeModalOnly() {
      taskModal.classList.remove("show");
      waitingModalClose = false;
    }

    function nextTurn() {
      currentPlayer = (currentPlayer + 1) % players.length;
      updateStatus();
      updateTurnText();
    }

    function finalizeTurn({ keepTurn = false } = {}) {
      closeModalOnly();
      if (gameOver) return;
      if (!keepTurn) nextTurn();
      else {
        updateStatus();
        updateTurnText();
      }
    }

    function applySnakeOrLadder(player, diceValue) {
      if (ladders[player.pos]) {
        const from = player.pos;
        const to = ladders[player.pos];
        player.pos = to;
        renderTokens();
        updateStatus();
        addLog(`${player.name} 走到梯子：從第 ${from} 格前進到第 ${to} 格。`);

        showModal({
          badge: "🪜 梯子",
          title: "爬上梯子",
          subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${from} 格`,
          dice: `🎲 ${diceValue}`,
          text: `你從第 ${from} 格前進到第 ${to} 格。`,
          note: "這一格不需要回答問題。",
          actions: [
            {
              label: "下一位玩家",
              onClick: () => finalizeTurn()
            }
          ]
        });
        return true;
      }

      if (snakes[player.pos]) {
        const from = player.pos;
        const to = snakes[player.pos];
        player.pos = to;
        renderTokens();
        updateStatus();
        addLog(`${player.name} 遇到蛇：從第 ${from} 格退回到第 ${to} 格。`);

        showModal({
          badge: "🐍 蛇",
          title: "踩到蛇了",
          subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${from} 格`,
          dice: `🎲 ${diceValue}`,
          text: `你從第 ${from} 格退回到第 ${to} 格。`,
          note: "這一格不需要回答問題。",
          actions: [
            {
              label: "下一位玩家",
              onClick: () => finalizeTurn()
            }
          ]
        });
        return true;
      }

      return false;
    }

    function applySpecial(player, diceValue) {
      const special = specials[player.pos];
      if (!special) return false;

      if (special.type === "rollAgain") {
        addLog(`${player.name} 走到特殊格：再擲一次。`);

        showModal({
          badge: "🎲 特殊移動",
          title: "再擲一次",
          subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${player.pos} 格`,
          dice: `🎲 ${diceValue}`,
          text: special.text,
          note: special.note,
          actions: [
            {
              label: "我知道了",
              onClick: () => finalizeTurn({ keepTurn: true })
            }
          ]
        });
        return true;
      }

      if (special.type === "forward2") {
        const from = player.pos;
        player.pos = Math.min(25, player.pos + 2);
        renderTokens();
        updateStatus();
        addLog(`${player.name} 走到特殊格：從第 ${from} 格前進到第 ${player.pos} 格。`);

        showModal({
          badge: "⏩ 特殊移動",
          title: "前進兩格",
          subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${from} 格`,
          dice: `🎲 ${diceValue}`,
          text: `你從第 ${from} 格前進到第 ${player.pos} 格。`,
          note: special.note,
          actions: [
            {
              label: "下一位玩家",
              onClick: () => finalizeTurn()
            }
          ]
        });
        return true;
      }

      if (special.type === "back1") {
        const from = player.pos;
        player.pos = Math.max(1, player.pos - 1);
        renderTokens();
        updateStatus();
        addLog(`${player.name} 走到特殊格：從第 ${from} 格後退到第 ${player.pos} 格。`);

        showModal({
          badge: "⏪ 特殊移動",
          title: "後退一格",
          subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${from} 格`,
          dice: `🎲 ${diceValue}`,
          text: `你從第 ${from} 格後退到第 ${player.pos} 格。`,
          note: special.note,
          actions: [
            {
              label: "下一位玩家",
              onClick: () => finalizeTurn()
            }
          ]
        });
        return true;
      }

      if (special.type === "dialogue") {
        addLog(`${player.name} 走到對話格。`);

        showModal({
          badge: "👥 特殊任務",
          title: "對話任務",
          subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${player.pos} 格`,
          dice: `🎲 ${diceValue}`,
          text: special.text,
          note: special.note,
          actions: [
            {
              label: "對話完成",
              onClick: () => finalizeTurn()
            }
          ]
        });
        return true;
      }

      return false;
    }

    function showQuestion(player, diceValue) {
      const q = questionMap[player.pos];
      if (!q) return false;

      addLog(`${player.name} 走到問題格：第 ${player.pos} 格。`);

      showModal({
        badge: "🎯 回答問題",
        title: `第 ${player.pos} 格`,
        subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${player.pos} 格`,
        dice: `🎲 ${diceValue}`,
        text: q,
        note: "請先讓學生回答，再選擇答對或答錯。",
        actions: [
          {
            label: "答對了",
            className: "success",
            onClick: () => {
              addLog(`${player.name} 回答正確。`);
              finalizeTurn();
            }
          },
          {
            label: "答錯了",
            className: "danger",
            onClick: () => {
              const from = player.pos;
              player.pos = Math.max(1, player.pos - 1);
              renderTokens();
              updateStatus();
              addLog(`${player.name} 回答錯誤：從第 ${from} 格退到第 ${player.pos} 格。`);
              finalizeTurn();
            }
          }
        ]
      });

      return true;
    }

    function checkWin(player, diceValue) {
      if (player.pos >= 25) {
        player.pos = 25;
        gameOver = true;
        renderTokens();
        updateStatus();
        updateTurnText();
        addLog(`🏁 ${player.name} 到達終點，獲勝！`);

        showModal({
          badge: "🏁 遊戲結束",
          title: "恭喜獲勝",
          subtitle: `${player.name} 擲到 ${diceValue} 點，到達終點`,
          dice: `🎲 ${diceValue}`,
          text: `${player.name} 到達第 25 格，完成遊戲！`,
          note: "可以按重新開始，再玩一次。",
          actions: [
            {
              label: "關閉",
              onClick: () => closeModalOnly()
            }
          ]
        });
        return true;
      }
      return false;
    }

    function showFreeCell(player, diceValue) {
      addLog(`${player.name} 走到自由格。`);

      showModal({
        badge: "☁️ 自由格",
        title: `第 ${player.pos} 格`,
        subtitle: `${player.name} 擲到 ${diceValue} 點，來到第 ${player.pos} 格`,
        dice: `🎲 ${diceValue}`,
        text: "這一格是自由格，沒有回答問題。",
        note: "按下方按鈕後，換下一位玩家。",
        actions: [
          {
            label: "下一位玩家",
            onClick: () => finalizeTurn()
          }
        ]
      });
    }

    function rollDice() {
      if (!gameStarted || waitingModalClose || gameOver) return;

      const player = players[currentPlayer];
      const dice = Math.floor(Math.random() * 6) + 1;
      diceEl.textContent = `🎲 ${dice}`;

      let nextPos = player.pos + dice;
      if (nextPos > 25) nextPos = 25;

      addLog(`${player.name} 擲到 ${dice} 點，前進到第 ${nextPos} 格。`);
      player.pos = nextPos;

      renderTokens();
      updateStatus();

      if (checkWin(player, dice)) return;
      if (applySnakeOrLadder(player, dice)) return;
      if (checkWin(player, dice)) return;
      if (applySpecial(player, dice)) return;
      if (checkWin(player, dice)) return;
      if (showQuestion(player, dice)) return;

      showFreeCell(player, dice);
    }

    function startGame() {
      createPlayers();
      currentPlayer = 0;
      gameStarted = true;
      gameOver = false;
      waitingModalClose = false;
      diceEl.textContent = "🎲";
      logEl.innerHTML = "";
      addLog("遊戲開始。");
      renderTokens();
      updateStatus();
      updateTurnText();
    }

    function resetGame() {
      startGame();
    }

    function createPlayers() {
      const count = Number(playerCountEl.value);
      players = [];

      for (let i = 0; i < count; i++) {
        const inputName = playerNameInputs[i].value.trim();
        players.push({
          name: inputName || `玩家${i + 1}`,
          pos: 1,
          color: playerColors[i]
        });
      }
    }

    playerCountEl.addEventListener("change", updateNameInputs);
    startBtn.addEventListener("click", startGame);
    resetBtn.addEventListener("click", resetGame);
    rollBtn.addEventListener("click", rollDice);

    createBoard();
    updateNameInputs();
    createPlayers();
    renderTokens();
    updateStatus();
    updateTurnText();
    diceEl.textContent = "🎲";
  </script>
</body>
</html>
