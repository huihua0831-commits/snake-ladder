<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>職場華語（二）紀錄與報告任務蛇梯遊戲</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#eef2f7;
}

.board{
display:grid;
grid-template-columns:repeat(5,80px);
grid-template-rows:repeat(5,80px);
gap:4px;
justify-content:center;
margin:30px auto;
}

.cell{
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-weight:bold;
background:white;
font-size:18px;
}

button{
padding:10px 16px;
margin:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h2>職場華語（二）紀錄與報告任務蛇梯遊戲</h2>

<div id="board" class="board"></div>

<p>骰子：<span id="dice">-</span></p>

<button onclick="rollDice()">擲骰子</button>
<button onclick="resetGame()">重新開始</button>

<p id="status"></p>

<script>

const board=document.getElementById("board")

const order=[
21,22,23,24,25,
20,19,18,17,16,
11,12,13,14,15,
10,9,8,7,6,
1,2,3,4,5
]

const snakes={
16:5
}

const ladders={
3:14
}

order.forEach(num=>{

const cell=document.createElement("div")
cell.className="cell"

let icon=""

if(snakes[num]) icon="🐍"
if(ladders[num]) icon="🪜"

cell.innerHTML=num+"<div>"+icon+"</div>"

cell.dataset.num=num

board.appendChild(cell)

})

const cells=document.querySelectorAll(".cell")

let position=1

function rollDice(){

const dice=Math.floor(Math.random()*6)+1

document.getElementById("dice").innerText=dice

position+=dice

if(position>25) position=25

if(snakes[position]){
alert("🐍 踩到蛇！")
position=snakes[position]
}

if(ladders[position]){
alert("🪜 爬上梯子！")
position=ladders[position]
}

update()

if(position==25){
alert("完成任務！")
}

}

function update(){

cells.forEach(c=>{
c.style.background="white"
})

const cell=[...cells].find(c=>c.dataset.num==position)

cell.style.background="#fde68a"

document.getElementById("status").innerText="目前位置："+position

}

function resetGame(){

position=1

update()

}

update()

</script>

</body>
</html>
