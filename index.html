<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>蛇梯遊戲</title>

<style>
body {
  margin:0;
  font-family: "Microsoft JhengHei";
}

/* ===== 開場畫面 ===== */
#startScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:
    repeating-linear-gradient(
      45deg,
      #f7c6c7 0px,
      #f7c6c7 80px,
      #f28c48 80px,
      #f28c48 160px
    );
}

h1{
  font-size:80px;
}

.start-btn{
  padding:15px 40px;
  font-size:24px;
  border-radius:20px;
  cursor:pointer;
}

/* ===== 棋盤 ===== */
#game{
  display:none;
  padding:20px;
}

.board{
  display:grid;
  grid-template-columns:repeat(5,100px);
  gap:5px;
}

.cell{
  width:100px;
  height:100px;
  border:1px solid #333;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* 玩家 */
.player{
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:22px;
  cursor:pointer;
}

.red{color:red;}
.blue{color:blue;}
.green{color:green;}
.yellow{color:orange;}

/* ===== modal ===== */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

/* 大題目 */
.question{
  font-size:32px;
  margin:20px;
}

button{
  padding:10px 20px;
  margin:10px;
}
</style>
</head>

<body>

<!-- 開場 -->
<div id="startScreen">
  <h1>🐍蛇梯🪜</h1>
  <button class="start-btn" onclick="startGame()">開始</button>
</div>

<!-- 遊戲 -->
<div id="game">
  <h2 id="turn"></h2>
  <div id="board" class="board"></div>
</div>

<!-- modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2 id="modalTitle"></h2>
    <div id="dice" style="font-size:50px;"></div>
    <div id="question" class="question"></div>
    <div id="buttons"></div>
  </div>
</div>

<script>

let players = [
 {name:"A",pos:1,color:"red"},
 {name:"B",pos:1,color:"blue"},
 {name:"C",pos:1,color:"green"},
 {name:"D",pos:1,color:"yellow"}
];

let current = 0;

const questions = [
"車禍是什麼時候發生的？",
"車禍大概幾點發生？",
"車禍是在哪裡發生的？",
"你騎機車還是開車？"
];

function startGame(){
 document.getElementById("startScreen").style.display="none";
 document.getElementById("game").style.display="block";
 createBoard();
 render();
}

function createBoard(){
 const board=document.getElementById("board");
 board.innerHTML="";

 for(let i=1;i<=25;i++){
  let cell=document.createElement("div");
  cell.className="cell";
  cell.innerText=i;
  board.appendChild(cell);
 }
}

function render(){
 document.getElementById("turn").innerText="輪到："+players[current].name;

 document.querySelectorAll(".player").forEach(p=>p.remove());

 players.forEach((p,i)=>{
  let cell=document.querySelectorAll(".cell")[p.pos-1];

  let icon=document.createElement("div");
  icon.className="player "+p.color;
  icon.innerText="👮";

  if(i===current){
    icon.onclick=rollDice;
  }

  cell.appendChild(icon);
 });
}

function rollDice(){
 openModal("擲骰子","🎲","",[
  {text:"擲骰",action:()=>{
    let n=Math.floor(Math.random()*6)+1;
    animateDice(n);
  }}
 ]);
}

function animateDice(n){
 let dice=document.getElementById("dice");
 let i=0;

 let interval=setInterval(()=>{
  dice.innerText=Math.floor(Math.random()*6)+1;
  i++;
  if(i>10){
    clearInterval(interval);
    dice.innerText=n;
    move(n);
  }
 },100);
}

function move(n){
 let p=players[current];
 p.pos=Math.min(25,p.pos+n);

 setTimeout(()=>{
  showQuestion(n);
 },500);
}

function showQuestion(n){
 let q=questions[Math.floor(Math.random()*questions.length)];

 openModal("任務","🎲"+n,q,[
  {text:"答對",action:next},
  {text:"答錯(退一格)",action:()=>{
    players[current].pos=Math.max(1,players[current].pos-1);
    next();
  }}
 ]);
}

function next(){
 closeModal();
 current=(current+1)%players.length;
 render();
}

function openModal(title,dice,q,buttons){
 document.getElementById("modal").style.display="flex";
 document.getElementById("modalTitle").innerText=title;
 document.getElementById("dice").innerText=dice;
 document.getElementById("question").innerText=q;

 let btnDiv=document.getElementById("buttons");
 btnDiv.innerHTML="";

 buttons.forEach(b=>{
  let btn=document.createElement("button");
  btn.innerText=b.text;
  btn.onclick=b.action;
  btnDiv.appendChild(btn);
 });
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
