<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職場華語（二）紀錄與報告任務蛇梯遊戲</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg-dark:#0f172a;
      --bg-mid:#1d4d2d;
      --panel:rgba(16,24,39,.82);
      --panel-soft:rgba(24,34,52,.88);
      --line:rgba(255,255,255,.14);
      --text:#f5f7ff;
      --muted:#d7e0f5;
      --gold:#f6c35d;
      --orange:#f28c48;
      --orange-dark:#cc5e17;
      --pink:#efc0cb;
      --blue:#60a5fa;
      --green:#4ade80;
      --red:#f87171;
      --yellow:#facc15;
      --shadow:0 18px 40px rgba(0,0,0,.32);
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(255,255,255,.06) 1px, transparent 1.5px) 0 0/120px 120px,
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.05) 1px, transparent 1.5px) 0 0/180px 180px,
        linear-gradient(180deg,#1a4620 0%, #2e6d33 100%);
      overflow-x:hidden;
    }

    .screen{
      min-height:100vh;
      display:none;
      padding:24px;
      animation:fadeIn .25s ease;
    }

    .screen.active{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(8px);}
      to{opacity:1; transform:translateY(0);}
    }

    @keyframes floaty{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-6px);}
    }

    @keyframes pulseBtn{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.04);}
    }

    @keyframes diceShake{
      0%{transform:rotate(0deg) scale(1);}
      20%{transform:rotate(-10deg) scale(1.08);}
      40%{transform:rotate(10deg) scale(.98);}
      60%{transform:rotate(-8deg) scale(1.08);}
      80%{transform:rotate(8deg) scale(.98);}
      100%{transform:rotate(0deg) scale(1);}
    }

    .hidden{display:none!important;}

    /* 首頁 */
    .hero-wrap{
      width:min(1100px,100%);
    }

    .hero-panel{
      position:relative;
      min-height:700px;
      overflow:hidden;
      border-radius:28px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.06) 0 2px, transparent 2px 100%) 0 0/120px 120px,
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.16)),
        linear-gradient(180deg,#4d922d 0%, #2e6d21 100%);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 24px;
    }

    .grass-overlay{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 15% 30%, rgba(255,255,255,.08), transparent 22%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.06), transparent 20%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,.06), transparent 18%);
      pointer-events:none;
    }

    .hero-deco{
      position:absolute;
      font-size:120px;
      filter:drop-shadow(0 10px 14px rgba(0,0,0,.22));
      user-select:none;
      pointer-events:none;
    }

    .hero-deco.sn1{left:50px; top:50px; transform:rotate(-18deg);}
    .hero-deco.sn2{right:70px; top:110px; transform:rotate(16deg);}
    .hero-deco.sn3{left:120px; bottom:60px; transform:rotate(18deg);}
    .hero-deco.l1{left:70px; top:180px; transform:rotate(-18deg); font-size:100px;}
    .hero-deco.l2{right:60px; top:180px; transform:rotate(20deg); font-size:100px;}

    .hero-content{
      position:relative;
      z-index:2;
    }

    .hero-title{
      font-size:clamp(60px,8vw,110px);
      font-weight:900;
      line-height:1;
      color:#ffbe2e;
      text-shadow:
        0 6px 0 rgba(116,59,0,.55),
        0 14px 24px rgba(0,0,0,.25);
      letter-spacing:2px;
      margin-bottom:12px;
    }

    .hero-subtitle{
      font-size:24px;
      font-weight:900;
      letter-spacing:1px;
      text-shadow:0 3px 12px rgba(0,0,0,.35);
      margin-bottom:44px;
    }

    .play-btn{
      width:130px;
      height:130px;
      border-radius:28px;
      border:none;
      cursor:pointer;
      font-size:58px;
      color:white;
      background:linear-gradient(180deg,#ffb15d 0%, #f28c48 100%);
      box-shadow:0 12px 0 var(--orange-dark), 0 20px 30px rgba(0,0,0,.25);
      animation:pulseBtn 2s ease-in-out infinite;
    }

    .play-btn:active{
      transform:translateY(6px);
      box-shadow:0 6px 0 var(--orange-dark), 0 12px 20px rgba(0,0,0,.25);
    }

    /* 共用卡片 */
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
      border-radius:28px;
      padding:28px;
    }

    /* 選玩家頁 */
    .select-wrap,
    .name-wrap{
      width:min(920px,100%);
    }

    .title{
      font-size:34px;
      font-weight:900;
      color:var(--gold);
      text-align:center;
      margin-bottom:8px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      line-height:1.8;
      margin-bottom:24px;
    }

    .player-choice-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
      max-width:760px;
      margin:0 auto;
    }

    .choice-btn{
      border:none;
      border-radius:24px;
      cursor:pointer;
      padding:28px 18px;
      color:white;
      background:linear-gradient(180deg,#ffa565 0%, #f07a32 100%);
      box-shadow:0 10px 0 #b55116;
      font:inherit;
      font-weight:900;
      transition:.16s ease;
    }

    .choice-btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.03);
    }

    .choice-btn.selected{
      outline:4px solid rgba(255,255,255,.28);
      transform:translateY(-2px);
    }

    .choice-icon{
      font-size:42px;
      margin-bottom:8px;
    }

    .choice-label{
      font-size:28px;
      margin-bottom:6px;
    }

    .choice-sub{
      font-size:14px;
      color:#fff6ee;
    }

    .actions{
      display:flex;
      gap:12px;
      justify-content:center;
      margin-top:24px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:14px 26px;
      cursor:pointer;
      font:inherit;
      font-weight:900;
      color:#111827;
      background:linear-gradient(180deg,#f7d28e 0%, #e2ab4b 100%);
      box-shadow:0 8px 0 #8a5b13;
    }

    .btn.secondary{
      color:white;
      background:linear-gradient(180deg,#ff7187 0%, #dc4b69 100%);
      box-shadow:0 8px 0 #7c1f35;
    }

    .btn.ghost{
      color:white;
      background:linear-gradient(180deg,#76b0ff 0%, #3e73d8 100%);
      box-shadow:0 8px 0 #1f3b7f;
    }

    .btn.success{
      color:white;
      background:linear-gradient(180deg,#43dc7f 0%, #1da356 100%);
      box-shadow:0 8px 0 #155e36;
    }

    .btn.danger{
      color:white;
      background:linear-gradient(180deg,#ff7a7a 0%, #d64545 100%);
      box-shadow:0 8px 0 #7a2020;
    }

    .btn:active{
      transform:translateY(4px);
      box-shadow:0 4px 0 rgba(0,0,0,.25);
    }

    /* 姓名頁 */
    .name-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .field{
      text-align:left;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-weight:800;
    }

    .field input{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:white;
      padding:13px 14px;
      font:inherit;
    }

    .field input::placeholder{
      color:#d9e1f6;
    }

    /* 遊戲頁 */
    .game-root{
      width:min(1450px,100%);
    }

    .game-shell{
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
      border-radius:28px;
      padding:22px;
    }

    .game-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .game-title{
      font-size:28px;
      font-weight:900;
      color:var(--gold);
    }

    .turn-chip{
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      font-weight:800;
    }

    .game-layout{
      display:grid;
      grid-template-columns:minmax(760px, 2fr) minmax(260px, 1fr);
      gap:22px;
      align-items:start;
    }

    .board-area{
      display:flex;
      justify-content:center;
    }

    .board-shell{
      position:relative;
      width:670px;
      height:670px;
      border-radius:30px;
      padding:18px;
      background:
        linear-gradient(180deg,#6b4b20 0%, #4e3416 100%);
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.05),
        0 20px 36px rgba(0,0,0,.28);
    }

    .board{
      position:relative;
      width:100%;
      height:100%;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      grid-template-rows:repeat(5,1fr);
      gap:4px;
      z-index:2;
    }

    .cell{
      position:relative;
      border-radius:18px;
      padding:10px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border:1px solid rgba(255,255,255,.15);
      box-shadow:
        inset 2px 2px 6px rgba(255,255,255,.08),
        inset -6px -6px 12px rgba(0,0,0,.18),
        0 8px 14px rgba(0,0,0,.12);
      overflow:hidden;
    }

    .cell.start{background:linear-gradient(145deg,#376bd0,#244f9a);}
    .cell.finish{background:linear-gradient(145deg,#8741c2,#652d92);}
    .cell.question{background:linear-gradient(145deg,#b7861e,#8e6512);}
    .cell.ladder{background:linear-gradient(145deg,#2e9455,#1f7441);}
    .cell.snake{background:linear-gradient(145deg,#b34365,#842d48);}
    .cell.special{background:linear-gradient(145deg,#2c8fbb,#1c6d91);}
    .cell.free{background:linear-gradient(145deg,#546177,#3c475c);}

    .cell-number{
      font-size:28px;
      font-weight:900;
      line-height:1;
    }

    .cell-icon{
      align-self:center;
      font-size:28px;
      line-height:1;
    }

    .cell-label{
      font-size:12px;
      line-height:1.25;
      color:#e5efff;
      min-height:32px;
    }

    .token-layer{
      position:absolute;
      right:6px;
      bottom:6px;
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:6px;
      max-width:86px;
      z-index:5;
    }

    .token{
      width:42px;
      height:42px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.95);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      box-shadow:0 8px 16px rgba(0,0,0,.24);
      cursor:default;
      transition:.16s ease;
      animation:floaty 2.1s ease-in-out infinite;
    }

    .token.active{
      cursor:pointer;
      transform:scale(1.08);
      box-shadow:0 0 0 5px rgba(255,255,255,.12), 0 10px 20px rgba(0,0,0,.28);
    }

    .token.active:hover{
      transform:scale(1.14);
    }

    .token.p1{background:var(--red);}
    .token.p2{background:var(--blue);}
    .token.p3{background:var(--green);}
    .token.p4{background:var(--yellow);}

    .board-svg{
      position:absolute;
      inset:18px;
      width:calc(100% - 36px);
      height:calc(100% - 36px);
      z-index:1;
      pointer-events:none;
    }

    .side-panel{
      display:grid;
      gap:14px;
    }

    .info-card{
      background:rgba(14,22,40,.88);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      text-align:left;
    }

    .info-card h3{
      margin:0 0 12px;
      color:var(--gold);
      font-size:18px;
    }

    .player-list{
      display:grid;
      gap:8px;
    }

    .player-item,
    .log-item{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px 12px;
      line-height:1.5;
    }

    .helper{
      color:var(--muted);
      line-height:1.75;
      font-size:14px;
    }

    .log{
      max-height:280px;
      overflow-y:auto;
      display:grid;
      gap:8px;
    }

    .dice-fab{
      position:absolute;
      right:24px;
      bottom:24px;
      width:84px;
      height:84px;
      border:none;
      border-radius:22px;
      cursor:pointer;
      font-size:34px;
      color:white;
      background:linear-gradient(180deg,#f8c96f 0%, #d9992f 100%);
      box-shadow:0 10px 0 #7f5717, 0 18px 24px rgba(0,0,0,.24);
      z-index:8;
      transition:.16s ease;
    }

    .dice-fab:hover{
      transform:translateY(-2px);
    }

    .dice-fab:active{
      transform:translateY(4px);
      box-shadow:0 4px 0 #7f5717, 0 10px 18px rgba(0,0,0,.24);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.7);
      display:flex;
      align-items:center;
      justify-content:center;
      visibility:hidden;
      opacity:0;
      transition:.22s ease;
      padding:18px;
      z-index:999;
    }

    .modal.show{
      visibility:visible;
      opacity:1;
    }

    .modal-card{
      width:100%;
      max-width:660px;
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
      border-radius:26px;
      padding:28px;
      text-align:center;
    }

    .modal-badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid var(--line);
      font-size:12px;
      font-weight:900;
      margin-bottom:12px;
    }

    .modal-title{
      font-size:34px;
      font-weight:900;
      color:var(--gold);
      margin-bottom:8px;
    }

    .modal-subtitle{
      color:var(--muted);
      line-height:1.7;
      margin-bottom:14px;
      white-space:pre-line;
    }

    .dice-box{
      font-size:84px;
      line-height:1;
      min-height:92px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:12px;
    }

    .dice-box.rolling{
      animation:diceShake .22s linear infinite;
    }

    .modal-question{
      font-size:38px;
      font-weight:900;
      line-height:1.5;
      margin:14px 0 18px;
      white-space:pre-line;
    }

    .modal-text{
      font-size:24px;
      line-height:1.7;
      margin:12px 0 18px;
      white-space:pre-line;
    }

    .modal-note{
      background:rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 14px;
      color:#dae4fb;
      line-height:1.7;
      font-size:14px;
      margin-bottom:18px;
      text-align:left;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    @media (max-width:1200px){
      .game-layout{
        grid-template-columns:1fr;
      }
      .board-shell{
        width:min(670px,100%);
        height:auto;
        aspect-ratio:1/1;
      }
    }

    @media (max-width:760px){
      .player-choice-grid,
      .name-grid,
      .form-grid{
        grid-template-columns:1fr;
      }
      .hero-main-title,
      .hero-title{
        font-size:58px;
      }
      .game-title{
        font-size:22px;
      }
      .modal-title{
        font-size:28px;
      }
      .modal-question{
        font-size:28px;
      }
      .modal-text{
        font-size:18px;
      }
      .dice-box{
        font-size:64px;
      }
    }
  </style>
</head>
<body>
  <!-- 首頁 -->
  <section id="startScreen" class="screen active">
    <div class="hero-wrap">
      <div class="hero-panel">
        <div class="grass-overlay"></div>
        <div class="hero-content">
          <div class="hero-title">蛇梯</div>
          <div class="hero-subtitle">職場華語（二）紀錄與報告任務蛇梯遊戲</div>
          <button class="play-btn" id="playBtn">▶</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 選玩家數 -->
  <section id="selectScreen" class="screen">
    <div class="select-wrap">
      <div class="card">
        <div class="title">選擇玩家人數</div>
        <div class="subtitle">請先選擇本次參與遊戲的玩家數量。</div>
        <div class="player-choice-grid">
          <button class="choice-btn" data-count="2">
            <div class="choice-icon">👥</div>
            <div class="choice-label">2 人</div>
            <div class="choice-sub">雙人對戰</div>
          </button>
          <button class="choice-btn" data-count="3">
            <div class="choice-icon">👮👮👮</div>
            <div class="choice-label">3 人</div>
            <div class="choice-sub">三人遊戲</div>
          </button>
          <button class="choice-btn" data-count="4">
            <div class="choice-icon">👮👮👮👮</div>
            <div class="choice-label">4 人</div>
            <div class="choice-sub">完整模式</div>
          </button>
        </div>
        <div class="actions">
          <button class="btn secondary" id="backHome2Btn">回首頁</button>
          <button class="btn" id="goNameBtn">下一步</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 玩家姓名 -->
  <section id="nameScreen" class="screen">
    <div class="name-wrap">
      <div class="card">
        <div class="title">輸入玩家名稱</div>
        <div class="subtitle">請輸入每位玩家的名字，完成後進入遊戲。</div>
        <div id="nameFields" class="name-grid"></div>
        <div class="actions">
          <button class="btn secondary" id="backSelectBtn">返回上一步</button>
          <button class="btn" id="enterGameBtn">進入遊戲</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 遊戲頁 -->
  <section id="gameScreen" class="screen">
    <div class="game-root">
      <div class="game-shell">
        <div class="game-header">
          <div class="game-title">職場華語（二）紀錄與報告任務蛇梯遊戲</div>
          <div class="turn-chip">目前玩家：<span id="currentTurnText">-</span></div>
        </div>

        <div class="game-layout">
          <div class="board-area">
            <div class="board-shell">
              <svg class="board-svg" viewBox="0 0 600 600" preserveAspectRatio="none">
                <!-- 梯子 -->
                <g stroke="#8fb1ff" stroke-width="8" stroke-linecap="round">
                  <line x1="302" y1="540" x2="418" y2="418"/>
                  <line x1="330" y1="560" x2="446" y2="438"/>
                  <line x1="310" y1="530" x2="338" y2="560"/>
                  <line x1="334" y1="505" x2="362" y2="535"/>
                  <line x1="358" y1="480" x2="386" y2="510"/>
                  <line x1="382" y1="455" x2="410" y2="485"/>
                  <line x1="406" y1="430" x2="434" y2="460"/>
                </g>

                <g stroke="#8fb1ff" stroke-width="8" stroke-linecap="round">
                  <line x1="186" y1="420" x2="304" y2="300"/>
                  <line x1="214" y1="440" x2="332" y2="320"/>
                  <line x1="194" y1="410" x2="222" y2="440"/>
                  <line x1="218" y1="385" x2="246" y2="415"/>
                  <line x1="242" y1="360" x2="270" y2="390"/>
                  <line x1="266" y1="335" x2="294" y2="365"/>
                </g>

                <g stroke="#8fb1ff" stroke-width="8" stroke-linecap="round">
                  <line x1="418" y1="300" x2="540" y2="180"/>
                  <line x1="446" y1="320" x2="568" y2="200"/>
                  <line x1="426" y1="290" x2="454" y2="320"/>
                  <line x1="450" y1="265" x2="478" y2="295"/>
                  <line x1="474" y1="240" x2="502" y2="270"/>
                  <line x1="498" y1="215" x2="526" y2="245"/>
                  <line x1="522" y1="190" x2="550" y2="220"/>
                </g>

                <!-- 蛇 -->
                <path d="M186 300
                         C120 320, 120 400, 188 420
                         C250 438, 250 500, 186 540"
                      fill="none" stroke="#ff6a8e" stroke-width="18" stroke-linecap="round"/>
                <circle cx="182" cy="295" r="18" fill="#ff6a8e"/>
                <circle cx="176" cy="290" r="3" fill="#3a1020"/>
                <circle cx="188" cy="290" r="3" fill="#3a1020"/>

                <path d="M422 180
                         C362 206, 360 255, 420 300
                         C472 336, 472 388, 420 420"
                      fill="none" stroke="#ffd84d" stroke-width="18" stroke-linecap="round"/>
                <circle cx="420" cy="174" r="18" fill="#ffd84d"/>
                <circle cx="414" cy="169" r="3" fill="#3a3a10"/>
                <circle cx="426" cy="169" r="3" fill="#3a3a10"/>

                <path d="M540 180
                         C590 150, 590 110, 538 60"
                      fill="none" stroke="#b776ff" stroke-width="18" stroke-linecap="round"/>
                <circle cx="540" cy="183" r="18" fill="#b776ff"/>
                <circle cx="534" cy="178" r="3" fill="#2d143d"/>
                <circle cx="546" cy="178" r="3" fill="#2d143d"/>
              </svg>

              <div id="board" class="board"></div>
              <button id="diceBtn" class="dice-fab">🎲</button>
            </div>
          </div>

          <div class="side-panel">
            <div class="info-card">
              <h3>玩家狀態</h3>
              <div id="playerList" class="player-list"></div>
            </div>

            <div class="info-card">
              <h3>操作方式</h3>
              <div class="helper">
                右下角骰子是目前玩家的操作按鈕。<br>
                按下後會先顯示擲骰動畫，再依序進入蛇、梯子、問題或特殊格視窗。
              </div>
            </div>

            <div class="info-card">
              <h3>遊戲紀錄</h3>
              <div id="log" class="log"></div>
            </div>

            <div class="info-card">
              <div class="actions" style="margin-top:0;">
                <button class="btn secondary" id="backSetupBtn">返回設定</button>
                <button class="btn ghost" id="restartBtn">重新開始</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- modal -->
  <div id="modal" class="modal">
    <div class="modal-card">
      <div id="modalBadge" class="modal-badge">事件</div>
      <div id="modalTitle" class="modal-title">標題</div>
      <div id="modalSubtitle" class="modal-subtitle"></div>
      <div id="modalDice" class="dice-box">🎲</div>
      <div id="modalQuestion" class="modal-question"></div>
      <div id="modalText" class="modal-text"></div>
      <div id="modalNote" class="modal-note"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>

  <script>
    const boardOrder = [
      21,22,23,24,25,
      20,19,18,17,16,
      11,12,13,14,15,
      10,9,8,7,6,
      1,2,3,4,5
    ];

    const questionMap = {
      2: "車禍是什麼時候發生的？",
      4: "車禍大概幾點發生？",
      5: "車禍是在哪裡發生的？",
      7: "車禍是在中山路和和平路的路口發生的嗎？",
      9: "你騎機車還是開車？對方呢？",
      11: "你的車號是多少？",
      13: "對方的車號是多少？",
      15: "車禍是怎麼發生的？",
      17: "你那個時候要直走、右轉還是左轉？",
      18: "對方的車是從哪裡來的？",
      21: "有人受傷嗎？",
      22: "車子有損壞嗎？",
      24: "事故發生以後，你做了什麼？"
    };

    const ladders = { 3: 8, 8: 14, 14: 20 };
    const snakes = { 12: 6, 19: 10, 23: 16 };
    const specials = {
      6: { type: "rollAgain", text: "你抽到特殊格：再擲一次。", note: "同一位玩家可以再按一次右下角骰子。" },
      10: { type: "forward2", text: "你抽到特殊格：前進兩格。", note: "系統會自動幫你前進兩格。" },
      16: { type: "back1", text: "你抽到特殊格：後退一格。", note: "系統會自動幫你後退一格。" },
      20: { type: "dialogue", text: "請和同學用兩句話做簡短對話。", note: "完成對話後再按按鈕。" }
    };

    const playerColors = ["p1","p2","p3","p4"];
    const avatars = ["👮‍♂️","👮‍♀️","🕵️","👮"];

    const startScreen = document.getElementById("startScreen");
    const selectScreen = document.getElementById("selectScreen");
    const nameScreen = document.getElementById("nameScreen");
    const gameScreen = document.getElementById("gameScreen");

    const playBtn = document.getElementById("playBtn");
    const backHome2Btn = document.getElementById("backHome2Btn");
    const goNameBtn = document.getElementById("goNameBtn");
    const backSelectBtn = document.getElementById("backSelectBtn");
    const enterGameBtn = document.getElementById("enterGameBtn");
    const backSetupBtn = document.getElementById("backSetupBtn");
    const restartBtn = document.getElementById("restartBtn");
    const diceBtn = document.getElementById("diceBtn");

    const boardEl = document.getElementById("board");
    const currentTurnText = document.getElementById("currentTurnText");
    const playerListEl = document.getElementById("playerList");
    const logEl = document.getElementById("log");
    const nameFieldsEl = document.getElementById("nameFields");

    const modal = document.getElementById("modal");
    const modalBadge = document.getElementById("modalBadge");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalDice = document.getElementById("modalDice");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalText = document.getElementById("modalText");
    const modalNote = document.getElementById("modalNote");
    const modalActions = document.getElementById("modalActions");

    let selectedPlayerCount = 2;
    let players = [];
    let currentPlayer = 0;
    let modalLocked = false;
    let gameStarted = false;
    let gameOver = false;

    function showScreen(target){
      [startScreen, selectScreen, nameScreen, gameScreen].forEach(s => s.classList.remove("active"));
      target.classList.add("active");
    }

    function buildPlayerChoiceSelection(){
      document.querySelectorAll(".choice-btn").forEach(btn => {
        btn.classList.toggle("selected", Number(btn.dataset.count) === selectedPlayerCount);
      });
    }

    function buildNameFields(){
      nameFieldsEl.innerHTML = "";
      for(let i = 0; i < selectedPlayerCount; i++){
        const div = document.createElement("div");
        div.className = "field";
        div.innerHTML = `
          <label for="playerName${i}">玩家 ${i + 1} 姓名</label>
          <input id="playerName${i}" type="text" value="學生${i + 1}">
        `;
        nameFieldsEl.appendChild(div);
      }
    }

    function getCellType(num){
      if(num === 1) return "start";
      if(num === 25) return "finish";
      if(questionMap[num]) return "question";
      if(ladders[num]) return "ladder";
      if(snakes[num]) return "snake";
      if(specials[num]) return "special";
      return "free";
    }

    function getCellDisplay(num){
      if(num === 1) return { icon:"🚩", label:"起點" };
      if(num === 25) return { icon:"🏁", label:"終點" };
      if(questionMap[num]) return { icon:"🎯", label:"回答問題" };
      if(ladders[num]) return { icon:"🪜", label:`${num} → ${ladders[num]}` };
      if(snakes[num]) return { icon:"🐍", label:`${num} → ${snakes[num]}` };
      if(specials[num]) return { icon:"🎲", label:"特殊格" };
      return { icon:"☁️", label:"自由格" };
    }

    function createBoard(){
      boardEl.innerHTML = "";
      boardOrder.forEach(num => {
        const type = getCellType(num);
        const display = getCellDisplay(num);
        const cell = document.createElement("div");
        cell.className = `cell ${type}`;
        cell.dataset.num = num;
        cell.innerHTML = `
          <div class="cell-number">${num}</div>
          <div class="cell-icon">${display.icon}</div>
          <div class="cell-label">${display.label}</div>
          <div class="token-layer"></div>
        `;
        boardEl.appendChild(cell);
      });
    }

    function createPlayers(){
      players = [];
      for(let i = 0; i < selectedPlayerCount; i++){
        const input = document.getElementById(`playerName${i}`);
        players.push({
          name: input.value.trim() || `玩家${i + 1}`,
          pos: 1,
          color: playerColors[i],
          avatar: avatars[i]
        });
      }
    }

    function renderTokens(){
      document.querySelectorAll(".token-layer").forEach(layer => layer.innerHTML = "");

      players.forEach((player, index) => {
        const cell = [...document.querySelectorAll(".cell")].find(c => Number(c.dataset.num) === player.pos);
        if(!cell) return;

        const layer = cell.querySelector(".token-layer");
        const token = document.createElement("div");
        token.className = `token ${player.color} ${index === currentPlayer && !modalLocked && !gameOver ? "active" : ""}`;
        token.innerHTML = player.avatar;
        token.title = player.name;
        layer.appendChild(token);
      });
    }

    function updatePlayerPanel(){
      playerListEl.innerHTML = "";
      players.forEach((player, index) => {
        const item = document.createElement("div");
        item.className = "player-item";
        item.innerHTML = `${player.avatar} <strong>${player.name}</strong>：第 ${player.pos} 格 ${index === currentPlayer && !gameOver ? "（目前玩家）" : ""}`;
        playerListEl.appendChild(item);
      });
      currentTurnText.textContent = gameOver ? "遊戲結束" : (players[currentPlayer]?.name || "-");
    }

    function addLog(text){
      const item = document.createElement("div");
      item.className = "log-item";
      item.textContent = text;
      logEl.prepend(item);
    }

    function openModal({badge, title, subtitle="", dice="🎲", question="", text="", note="", actions=[]}){
      modalBadge.textContent = badge;
      modalTitle.textContent = title;
      modalSubtitle.textContent = subtitle;
      modalDice.textContent = dice;
      modalQuestion.textContent = question;
      modalText.textContent = text;
      modalNote.textContent = note;
      modalActions.innerHTML = "";

      actions.forEach(action => {
        const btn = document.createElement("button");
        btn.className = `btn ${action.className || ""}`.trim();
        btn.textContent = action.label;
        btn.addEventListener("click", action.onClick);
        modalActions.appendChild(btn);
      });

      modal.classList.add("show");
      modalLocked = true;
      diceBtn.disabled = true;
    }

    function closeModal(){
      modal.classList.remove("show");
      modalLocked = false;
      diceBtn.disabled = false;
    }

    function nextTurn(){
      currentPlayer = (currentPlayer + 1) % players.length;
      updatePlayerPanel();
      renderTokens();
    }

    function finishTurn(keepTurn=false){
      closeModal();
      if(gameOver) return;
      if(!keepTurn) nextTurn();
      else {
        updatePlayerPanel();
        renderTokens();
      }
    }

    function openDiceModal(){
      if(!gameStarted || modalLocked || gameOver) return;

      const player = players[currentPlayer];
      openModal({
        badge:"🎲 擲骰子",
        title:"輪到你了",
        subtitle:`${player.avatar} ${player.name}，請按下按鈕擲骰子`,
        dice:"🎲",
        note:"按下後會先播放擲骰動畫，再進入下一個事件視窗。",
        actions:[
          {
            label:"開始擲骰",
            onClick: rollDiceAnimated
          }
        ]
      });
    }

    function rollDiceAnimated(){
      modalActions.innerHTML = "";
      const faces = ["⚀","⚁","⚂","⚃","⚄","⚅"];
      let count = 0;
      modalDice.classList.add("rolling");

      const interval = setInterval(() => {
        modalDice.textContent = faces[Math.floor(Math.random()*6)];
        count++;
        if(count >= 14){
          clearInterval(interval);
          modalDice.classList.remove("rolling");
          const dice = Math.floor(Math.random()*6) + 1;
          modalDice.textContent = faces[dice - 1];
          setTimeout(() => executeRoll(dice), 450);
        }
      }, 90);
    }

    function executeRoll(dice){
      const player = players[currentPlayer];
      const nextPos = Math.min(25, player.pos + dice);

      addLog(`${player.name} 擲到 ${dice} 點，前進到第 ${nextPos} 格。`);
      player.pos = nextPos;
      updatePlayerPanel();
      renderTokens();

      if(checkWin(player, dice)) return;
      if(handleLadderOrSnake(player, dice)) return;
      if(checkWin(player, dice)) return;
      if(handleSpecial(player, dice)) return;
      if(checkWin(player, dice)) return;
      if(handleQuestion(player, dice)) return;

      openFreeModal(player, dice);
    }

    function checkWin(player, dice){
      if(player.pos >= 25){
        player.pos = 25;
        gameOver = true;
        updatePlayerPanel();
        renderTokens();
        addLog(`🏁 ${player.name} 到達終點，獲勝！`);

        openModal({
          badge:"🏁 遊戲結束",
          title:"恭喜獲勝",
          subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，到達第 25 格`,
          dice:"🏆",
          text:`${player.name} 完成遊戲！`,
          note:"可以重新開始，或返回設定頁重新設定玩家。",
          actions:[
            {
              label:"關閉",
              className:"secondary",
              onClick: closeModal
            }
          ]
        });
        return true;
      }
      return false;
    }

    function handleLadderOrSnake(player, dice){
      if(ladders[player.pos]){
        const from = player.pos;
        const to = ladders[player.pos];
        player.pos = to;
        updatePlayerPanel();
        renderTokens();
        addLog(`${player.name} 爬上梯子：從第 ${from} 格前進到第 ${to} 格。`);

        openModal({
          badge:"🪜 梯子",
          title:"爬上梯子",
          subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${from} 格`,
          dice:"🪜",
          text:`你從第 ${from} 格前進到第 ${to} 格。`,
          note:"這一格不需要回答問題。",
          actions:[
            {
              label:"下一位玩家",
              onClick: () => finishTurn()
            }
          ]
        });
        return true;
      }

      if(snakes[player.pos]){
        const from = player.pos;
        const to = snakes[player.pos];
        player.pos = to;
        updatePlayerPanel();
        renderTokens();
        addLog(`${player.name} 踩到蛇：從第 ${from} 格退回到第 ${to} 格。`);

        openModal({
          badge:"🐍 蛇",
          title:"踩到蛇了",
          subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${from} 格`,
          dice:"🐍",
          text:`你從第 ${from} 格退回到第 ${to} 格。`,
          note:"這一格不需要回答問題。",
          actions:[
            {
              label:"下一位玩家",
              onClick: () => finishTurn()
            }
          ]
        });
        return true;
      }

      return false;
    }

    function handleSpecial(player, dice){
      const special = specials[player.pos];
      if(!special) return false;

      if(special.type === "rollAgain"){
        addLog(`${player.name} 走到特殊格：再擲一次。`);
        openModal({
          badge:"🎲 特殊格",
          title:"再擲一次",
          subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${player.pos} 格`,
          dice:"🎲",
          text:special.text,
          note:special.note,
          actions:[
            {
              label:"我知道了",
              onClick: () => finishTurn(true)
            }
          ]
        });
        return true;
      }

      if(special.type === "forward2"){
        const from = player.pos;
        player.pos = Math.min(25, player.pos + 2);
        updatePlayerPanel();
        renderTokens();
        addLog(`${player.name} 走到特殊格：從第 ${from} 格前進到第 ${player.pos} 格。`);

        openModal({
          badge:"⏩ 特殊格",
          title:"前進兩格",
          subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${from} 格`,
          dice:"⏩",
          text:`你從第 ${from} 格前進到第 ${player.pos} 格。`,
          note:special.note,
          actions:[
            {
              label:"下一位玩家",
              onClick: () => finishTurn()
            }
          ]
        });
        return true;
      }

      if(special.type === "back1"){
        const from = player.pos;
        player.pos = Math.max(1, player.pos - 1);
        updatePlayerPanel();
        renderTokens();
        addLog(`${player.name} 走到特殊格：從第 ${from} 格後退到第 ${player.pos} 格。`);

        openModal({
          badge:"⏪ 特殊格",
          title:"後退一格",
          subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${from} 格`,
          dice:"⏪",
          text:`你從第 ${from} 格後退到第 ${player.pos} 格。`,
          note:special.note,
          actions:[
            {
              label:"下一位玩家",
              onClick: () => finishTurn()
            }
          ]
        });
        return true;
      }

      if(special.type === "dialogue"){
        addLog(`${player.name} 走到特殊格：對話任務。`);
        openModal({
          badge:"👥 特殊格",
          title:"對話任務",
          subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${player.pos} 格`,
          dice:"💬",
          text:special.text,
          note:special.note,
          actions:[
            {
              label:"完成對話",
              onClick: () => finishTurn()
            }
          ]
        });
        return true;
      }

      return false;
    }

    function handleQuestion(player, dice){
      const question = questionMap[player.pos];
      if(!question) return false;

      addLog(`${player.name} 走到問題格：第 ${player.pos} 格。`);
      openModal({
        badge:"🎯 問題格",
        title:`第 ${player.pos} 格`,
        subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${player.pos} 格`,
        dice:"❓",
        question:question,
        note:"請先讓學生口頭回答，再選擇答對或答錯。",
        actions:[
          {
            label:"答對了",
            className:"success",
            onClick: () => {
              addLog(`${player.name} 回答正確。`);
              finishTurn();
            }
          },
          {
            label:"答錯了",
            className:"danger",
            onClick: () => {
              const from = player.pos;
              player.pos = Math.max(1, player.pos - 1);
              updatePlayerPanel();
              renderTokens();
              addLog(`${player.name} 回答錯誤：從第 ${from} 格退到第 ${player.pos} 格。`);
              finishTurn();
            }
          }
        ]
      });
      return true;
    }

    function openFreeModal(player, dice){
      addLog(`${player.name} 走到自由格。`);
      openModal({
        badge:"☁️ 自由格",
        title:`第 ${player.pos} 格`,
        subtitle:`${player.avatar} ${player.name} 擲到 ${dice} 點，來到第 ${player.pos} 格`,
        dice:"☁️",
        text:"這一格是自由格，沒有任務。",
        note:"按下方按鈕後，輪到下一位玩家。",
        actions:[
          {
            label:"下一位玩家",
            onClick: () => finishTurn()
          }
        ]
      });
    }

    function startGame(){
      createPlayers();
      currentPlayer = 0;
      gameStarted = true;
      gameOver = false;
      modalLocked = false;
      createBoard();
      updatePlayerPanel();
      renderTokens();
      logEl.innerHTML = "";
      addLog("遊戲開始。");
      showScreen(gameScreen);
    }

    function restartGame(){
      players.forEach(p => p.pos = 1);
      currentPlayer = 0;
      gameStarted = true;
      gameOver = false;
      modalLocked = false;
      closeModal();
      updatePlayerPanel();
      renderTokens();
      logEl.innerHTML = "";
      addLog("遊戲重新開始。");
    }

    // events
    playBtn.addEventListener("click", () => showScreen(selectScreen));
    backHome2Btn.addEventListener("click", () => showScreen(startScreen));
    backSelectBtn.addEventListener("click", () => showScreen(selectScreen));
    enterGameBtn.addEventListener("click", startGame);
    backSetupBtn.addEventListener("click", () => {
      closeModal();
      showScreen(nameScreen);
    });
    restartBtn.addEventListener("click", restartGame);
    diceBtn.addEventListener("click", openDiceModal);

    document.querySelectorAll(".choice-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedPlayerCount = Number(btn.dataset.count);
        buildPlayerChoiceSelection();
      });
    });

    goNameBtn.addEventListener("click", () => {
      buildNameFields();
      showScreen(nameScreen);
    });

    // init
    buildPlayerChoiceSelection();
    buildNameFields();
  </script>
</body>
</html>
