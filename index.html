<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職場華語蛇梯遊戲</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3f0;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 1.1fr) minmax(300px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 20px 0;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .panel-body {
      padding: 18px 20px 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 18px 20px 20px;
    }

    .cell {
      position: relative;
      min-height: 108px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .cell:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.08);
    }

    .cell.special-reward { background: linear-gradient(180deg, #f0fdf4 0%, #ffffff 100%); }
    .cell.special-challenge { background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%); }
    .cell.start { background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%); }
    .cell.finish { background: linear-gradient(180deg, #f5f3ff 0%, #ffffff 100%); }

    .cell-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .cell-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .badge.reward {
      color: var(--success);
      background: var(--success-soft);
    }

    .badge.challenge {
      color: var(--warning);
      background: var(--warning-soft);
    }

    .badge.start, .badge.finish {
      color: var(--primary);
      background: var(--primary-soft);
    }

    .cell-title {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.4;
      margin-top: 8px;
      margin-bottom: 6px;
    }

    .cell-desc {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      flex: 1;
    }

    .tokens {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .token {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
      font-size: 13px;
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: #fcfdff;
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: white;
      color: var(--text);
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-card {
      display: grid;
      gap: 10px;
    }

    .big {
      font-size: 28px;
      font-weight: 900;
    }

    .muted { color: var(--muted); }

    .task-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .task-type {
      display: inline-block;
      width: fit-content;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
    }

    .task-content {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.6;
    }

    .sample {
      background: #f9fafb;
      border-radius: 14px;
      padding: 12px;
      line-height: 1.7;
      color: #374151;
    }

    .player-list {
      display: grid;
      gap: 10px;
    }

    .player-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: white;
      display: grid;
      gap: 6px;
    }

    .player-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 800;
    }

    .log {
      max-height: 220px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .log-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5edf8;
      font-size: 14px;
      line-height: 1.6;
    }

    .footer-note {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .board {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        padding: 12px;
      }
      .cell {
        min-height: 94px;
        padding: 8px;
      }
      .cell-title { font-size: 13px; }
      .cell-desc { font-size: 12px; }
      .player-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="header">
      <h1>職場華語（二）蛇梯遊戲</h1>
      <p>
        適合 TOCFL A2 學生。主題包含車禍紀錄、事故說明、文件檢查與入境審查。
        玩家擲骰前進，走到格子後完成口說任務；遇到獎勵格或挑戰格，系統會自動處理。
      </p>
    </section>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2>遊戲棋盤</h2>
        </div>
        <div id="board" class="board"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>遊戲控制</h2>
        </div>
        <div class="panel-body controls">
          <div class="section">
            <h3>玩家設定</h3>
            <label for="playerCount">玩家人數</label>
            <select id="playerCount">
              <option value="2">2 人</option>
              <option value="3">3 人</option>
              <option value="4">4 人</option>
            </select>

            <div class="player-grid" style="margin-top: 12px;">
              <div>
                <label for="player1">玩家 1 名稱</label>
                <input id="player1" value="小明" />
              </div>
              <div>
                <label for="player2">玩家 2 名稱</label>
                <input id="player2" value="小美" />
              </div>
              <div>
                <label for="player3">玩家 3 名稱</label>
                <input id="player3" value="小安" />
              </div>
              <div>
                <label for="player4">玩家 4 名稱</label>
                <input id="player4" value="小華" />
              </div>
            </div>

            <div class="row" style="margin-top: 14px;">
              <button class="btn-primary" id="startBtn">開始新遊戲</button>
              <button class="btn-secondary" id="resetBtn">重設位置</button>
            </div>
          </div>

          <div class="section status-card">
            <h3>目前狀態</h3>
            <div>現在輪到：<span id="currentPlayer" class="big">—</span></div>
            <div>骰子點數：<span id="diceValue" class="big">—</span></div>
            <div class="row">
              <button class="btn-primary" id="rollBtn" disabled>擲骰子</button>
              <button class="btn-secondary" id="finishTaskBtn" disabled>完成任務，換下一位</button>
            </div>
            <div class="footer-note">
              規則：玩家先擲骰，再完成格子任務。完成後按「完成任務，換下一位」。若走到特殊格，會自動顯示效果。
            </div>
          </div>

          <div class="section">
            <h3>本回合任務</h3>
            <div id="taskBox" class="task-box">
              <div class="task-type">尚未開始</div>
              <div class="task-content">請先按「開始新遊戲」。</div>
              <div class="sample">學生回答示例會顯示在這裡。</div>
            </div>
          </div>

          <div class="section">
            <h3>玩家位置</h3>
            <div id="playerList" class="player-list"></div>
          </div>

          <div class="section">
            <h3>遊戲紀錄</h3>
            <div id="log" class="log"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const tokenColors = ["#2563eb", "#ec4899", "#16a34a", "#f59e0b"];

    const boardData = [
      { num: 1, title: "開始", type: "start", content: "請說：我準備開始玩蛇梯遊戲。", sample: "我準備開始玩蛇梯遊戲。" },
      { num: 2, title: "造句", type: "sentence", content: "請用「車禍」造句。", sample: "今天早上發生車禍。" },
      { num: 3, title: "回答問題", type: "question", content: "車禍是在哪裡發生的？", sample: "車禍在十字路口發生。" },
      { num: 4, title: "對話任務", type: "dialogue", content: "和同學對話：A 問『你怎麼來學校？』B 回答。", sample: "A：你怎麼來學校？ B：我騎機車來學校。" },
      { num: 5, title: "獎勵格", type: "reward", effect: "forward2", effectText: "前進兩格", content: "你答得很好，前進兩格。", sample: "太好了！我前進兩格。" },
      { num: 6, title: "造句", type: "sentence", content: "請用「發生」造句。", sample: "事故昨天晚上發生。" },
      { num: 7, title: "看情境說句子", type: "speaking", content: "請說一句包含「右轉」的句子。", sample: "他右轉的時候沒看到我。" },
      { num: 8, title: "挑戰格", type: "challenge", effect: "loseTurn", effectText: "停一回合", content: "回答錯誤要停一回合。先說一句：我下一回合要休息。", sample: "我下一回合要休息。" },
      { num: 9, title: "回答問題", type: "question", content: "有人受傷嗎？", sample: "有，我的手擦傷了。" },
      { num: 10, title: "對話任務", type: "dialogue", content: "和同學對話：A 問『你的車子有損壞嗎？』B 回答。", sample: "A：你的車子有損壞嗎？ B：有，我的車燈壞了。" },
      { num: 11, title: "獎勵格", type: "reward", effect: "rollAgain", effectText: "再擲一次", content: "恭喜你，再擲一次。", sample: "我可以再擲一次。" },
      { num: 12, title: "造句", type: "sentence", content: "請用「文件」造句。", sample: "這份文件沒有問題。" },
      { num: 13, title: "回答問題", type: "question", content: "這本護照有效嗎？請自己說一個答案。", sample: "這本護照有效。" },
      { num: 14, title: "挑戰格", type: "challenge", effect: "back1", effectText: "後退一格", content: "請先說一句：資料不一致。然後後退一格。", sample: "資料不一致。" },
      { num: 15, title: "看情境說句子", type: "speaking", content: "請用「不一致」說一句話。", sample: "文件和旅客的回答不一致。" },
      { num: 16, title: "獎勵格", type: "reward", effect: "taskForward1", effectText: "說對話成功可再前進一格", content: "先和同學完成一組簡短對話，成功可再前進一格。", sample: "A：請問你的簽證有效嗎？ B：有效。" },
      { num: 17, title: "對話任務", type: "dialogue", content: "和同學對話：A 問『文件有破損嗎？』B 回答。", sample: "A：文件有破損嗎？ B：沒有，文件完好。" },
      { num: 18, title: "造句", type: "sentence", content: "請用「符合規定」造句。", sample: "這些文件都符合規定。" },
      { num: 19, title: "挑戰格", type: "challenge", effect: "startOver", effectText: "回到起點", content: "糟糕，請回到起點。回去前先說：我要重新開始。", sample: "我要重新開始。" },
      { num: 20, title: "回答問題", type: "question", content: "旅客沒有住宿證明，應該怎麼做？", sample: "需要請旅客補件或說明。" },
      { num: 21, title: "獎勵格", type: "reward", effect: "forward2", effectText: "前進兩格", content: "你回答得很完整，前進兩格。", sample: "我前進兩格。" },
      { num: 22, title: "造句", type: "sentence", content: "請用「進一步調查」造句。", sample: "這個情況需要進一步調查。" },
      { num: 23, title: "挑戰格", type: "challenge", effect: "loseTurn", effectText: "停一回合", content: "這格是挑戰格。請說一句：我先停一回合。", sample: "我先停一回合。" },
      { num: 24, title: "對話任務", type: "dialogue", content: "和同學對話：A 問『事故發生以後，你做了什麼？』B 回答。", sample: "A：事故發生以後，你做了什麼？ B：我拍照，也報警了。" },
      { num: 25, title: "終點", type: "finish", content: "請用兩句話做簡單報告，然後恭喜過關。", sample: "今天早上在路口發生車禍。後來我拍照，也報警了。" }
    ];

    const playerCountEl = document.getElementById('playerCount');
    const playerInputs = [1, 2, 3, 4].map(n => document.getElementById(`player${n}`));
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const rollBtn = document.getElementById('rollBtn');
    const finishTaskBtn = document.getElementById('finishTaskBtn');
    const boardEl = document.getElementById('board');
    const currentPlayerEl = document.getElementById('currentPlayer');
    const diceValueEl = document.getElementById('diceValue');
    const taskBoxEl = document.getElementById('taskBox');
    const playerListEl = document.getElementById('playerList');
    const logEl = document.getElementById('log');

    let players = [];
    let currentIndex = 0;
    let started = false;
    let waitingFinish = false;
    let winner = null;

    function log(message) {
      const item = document.createElement('div');
      item.className = 'log-item';
      item.textContent = message;
      logEl.prepend(item);
    }

    function getVisiblePlayerCount() {
      return Number(playerCountEl.value);
    }

    function updatePlayerInputVisibility() {
      const count = getVisiblePlayerCount();
      playerInputs.forEach((input, idx) => {
        input.parentElement.style.display = idx < count ? 'block' : 'none';
      });
    }

    function createPlayers() {
      const count = getVisiblePlayerCount();
      players = Array.from({ length: count }, (_, idx) => ({
        id: idx,
        name: playerInputs[idx].value.trim() || `玩家${idx + 1}`,
        pos: 1,
        skip: 0,
        color: tokenColors[idx]
      }));
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      const ordered = [...boardData].reverse();
      ordered.forEach(cell => {
        const div = document.createElement('div');
        let extraClass = '';
        if (cell.type === 'reward') extraClass = 'special-reward';
        if (cell.type === 'challenge') extraClass = 'special-challenge';
        if (cell.type === 'start') extraClass = 'start';
        if (cell.type === 'finish') extraClass = 'finish';
        div.className = `cell ${extraClass}`;

        const tokens = players
          .filter(p => p.pos === cell.num)
          .map(p => `<span class="token" style="background:${p.color}">${p.name.slice(0, 1)}</span>`)
          .join('');

        const badge = (() => {
          if (cell.type === 'reward') return `<span class="badge reward">${cell.effectText}</span>`;
          if (cell.type === 'challenge') return `<span class="badge challenge">${cell.effectText}</span>`;
          if (cell.type === 'start') return `<span class="badge start">開始</span>`;
          if (cell.type === 'finish') return `<span class="badge finish">終點</span>`;
          return '';
        })();

        div.innerHTML = `
          <div class="cell-top">
            <span class="cell-num">${cell.num}</span>
            ${badge}
          </div>
          <div class="cell-title">${cell.title}</div>
          <div class="cell-desc">${cell.content}</div>
          <div class="tokens">${tokens}</div>
        `;

        boardEl.appendChild(div);
      });
    }

    function renderPlayers() {
      playerListEl.innerHTML = '';
      players.forEach((player, idx) => {
        const div = document.createElement('div');
        div.className = 'player-card';
        div.innerHTML = `
          <div class="player-title">
            <span><span class="token" style="background:${player.color}; vertical-align:middle; margin-right:8px;">${player.name.slice(0,1)}</span>${player.name}</span>
            <span>${idx === currentIndex && started && !winner ? '目前回合' : ''}</span>
          </div>
          <div>位置：第 ${player.pos} 格</div>
          <div class="muted">${player.skip > 0 ? `還要停 ${player.skip} 回合` : '可正常行動'}</div>
        `;
        playerListEl.appendChild(div);
      });
    }

    function showTask(cell, extraText = '') {
      const typeMap = {
        start: '開始',
        finish: '終點任務',
        sentence: '用詞語造句',
        question: '回答問題',
        dialogue: '和同學對話',
        speaking: '口說任務',
        reward: '獎勵格',
        challenge: '挑戰格'
      };

      taskBoxEl.innerHTML = `
        <div class="task-type">${typeMap[cell.type] || '任務'}</div>
        <div class="task-content">${cell.content}</div>
        <div class="sample"><strong>學生回答示例：</strong><br>${cell.sample}${extraText ? `<br><br><strong>系統說明：</strong><br>${extraText}` : ''}</div>
      `;
    }

    function updateStatus(dice = '—') {
      currentPlayerEl.textContent = players[currentIndex]?.name || '—';
      diceValueEl.textContent = dice;
      renderBoard();
      renderPlayers();
    }

    function nextPlayer() {
      if (winner) return;
      let attempts = 0;
      do {
        currentIndex = (currentIndex + 1) % players.length;
        const player = players[currentIndex];
        if (player.skip > 0) {
          player.skip -= 1;
          log(`${player.name} 這回合跳過。`);
        } else {
          break;
        }
        attempts += 1;
      } while (attempts <= players.length);

      updateStatus();
      waitingFinish = false;
      rollBtn.disabled = false;
      finishTaskBtn.disabled = true;
      showTask({ type: 'speaking', content: `現在輪到 ${players[currentIndex].name}，請按「擲骰子」。`, sample: '準備好了。' });
    }

    function applySpecialEffect(player, cell) {
      let note = '';
      if (cell.effect === 'forward2') {
        player.pos = Math.min(25, player.pos + 2);
        note = `${player.name} 觸發獎勵：前進兩格。`;
      } else if (cell.effect === 'rollAgain') {
        note = `${player.name} 觸發獎勵：本回合可以再擲一次。`;
        rollBtn.disabled = false;
        finishTaskBtn.disabled = true;
        waitingFinish = false;
      } else if (cell.effect === 'taskForward1') {
        player.pos = Math.min(25, player.pos + 1);
        note = `${player.name} 完成對話後再前進一格。`;
      } else if (cell.effect === 'back1') {
        player.pos = Math.max(1, player.pos - 1);
        note = `${player.name} 觸發挑戰：後退一格。`;
      } else if (cell.effect === 'startOver') {
        player.pos = 1;
        note = `${player.name} 觸發挑戰：回到起點。`;
      } else if (cell.effect === 'loseTurn') {
        player.skip += 1;
        note = `${player.name} 觸發挑戰：下一回合停一回合。`;
      }
      return note;
    }

    function getCellByNum(num) {
      return boardData.find(c => c.num === num);
    }

    function checkWinner(player) {
      if (player.pos >= 25) {
        player.pos = 25;
        winner = player;
        showTask(getCellByNum(25), `${player.name} 已經到達終點，請完成終點口說任務。`);
        log(`🎉 ${player.name} 到達終點，獲勝！`);
        rollBtn.disabled = true;
        finishTaskBtn.disabled = true;
        updateStatus('—');
        return true;
      }
      return false;
    }

    function rollDice() {
      if (!started || waitingFinish || winner) return;
      const player = players[currentIndex];
      const dice = Math.floor(Math.random() * 6) + 1;
      let newPos = player.pos + dice;
      if (newPos > 25) newPos = 25;
      player.pos = newPos;

      log(`${player.name} 擲到 ${dice} 點，前進到第 ${player.pos} 格。`);
      updateStatus(dice);

      if (checkWinner(player)) return;

      let cell = getCellByNum(player.pos);
      let extraText = '';

      if (cell.type === 'reward' || cell.type === 'challenge') {
        const note = applySpecialEffect(player, cell);
        log(note);
        updateStatus(dice);
        if (checkWinner(player)) return;
        cell = getCellByNum(player.pos);
        extraText = note;
      }

      showTask(cell, extraText);

      if (cell.type === 'reward' && getCellByNum(newPos).effect === 'rollAgain') {
        waitingFinish = false;
        rollBtn.disabled = false;
        finishTaskBtn.disabled = true;
      } else {
        waitingFinish = true;
        rollBtn.disabled = true;
        finishTaskBtn.disabled = false;
      }
    }

    function startGame() {
      createPlayers();
      currentIndex = 0;
      started = true;
      waitingFinish = false;
      winner = null;
      logEl.innerHTML = '';
      log('新遊戲開始。');
      updateStatus();
      renderBoard();
      renderPlayers();
      showTask({ type: 'speaking', content: `現在輪到 ${players[0].name}，請按「擲骰子」。`, sample: '我準備好了。' });
      rollBtn.disabled = false;
      finishTaskBtn.disabled = true;
    }

    function resetPositions() {
      if (!players.length) {
        createPlayers();
      }
      players.forEach(p => {
        p.pos = 1;
        p.skip = 0;
      });
      currentIndex = 0;
      winner = null;
      waitingFinish = false;
      started = true;
      log('位置已重設。');
      updateStatus();
      showTask({ type: 'speaking', content: `位置已重設，現在輪到 ${players[0].name}。`, sample: '重新開始吧。' });
      rollBtn.disabled = false;
      finishTaskBtn.disabled = true;
    }

    playerCountEl.addEventListener('change', updatePlayerInputVisibility);
    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetPositions);
    rollBtn.addEventListener('click', rollDice);
    finishTaskBtn.addEventListener('click', nextPlayer);

    updatePlayerInputVisibility();
    createPlayers();
    renderBoard();
    renderPlayers();
  </script>
</body>
</html>
