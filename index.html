<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>職場華語蛇梯遊戲</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://i.imgur.com/3ZQ3Z3Z.jpg');
  background-size:cover;
  text-align:center;
}

.screen{display:none;}
.active{display:block;}

button{
  padding:15px 30px;
  font-size:20px;
  border-radius:15px;
  border:none;
  cursor:pointer;
}

/* 開場 */
#startScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#startBtn{
  background:orange;
  font-size:40px;
}

/* 棋盤 */
.board{
  display:grid;
  grid-template-columns:repeat(5,80px);
  gap:5px;
  justify-content:center;
  margin-top:20px;
}

.cell{
  width:80px;
  height:80px;
  background:#fff8dc;
  border:2px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-weight:bold;
}

.player{
  position:absolute;
  bottom:5px;
  right:5px;
}

#diceBtn{
  position:fixed;
  right:30px;
  bottom:30px;
  font-size:30px;
}

</style>
</head>

<body>

<!-- 1️⃣ 開場 -->
<div id="startScreen" class="screen active">
  <h1>🐍 蛇梯遊戲 🪜</h1>
  <button id="startBtn">▶️</button>
</div>

<!-- 2️⃣ 選玩家數 -->
<div id="selectScreen" class="screen">
  <h2>選擇玩家人數</h2>
  <button onclick="selectPlayers(2)">2人</button>
  <button onclick="selectPlayers(3)">3人</button>
  <button onclick="selectPlayers(4)">4人</button>
</div>

<!-- 3️⃣ 輸入名字 -->
<div id="nameScreen" class="screen">
  <h2>輸入玩家名稱</h2>
  <div id="nameInputs"></div>
  <br>
  <button onclick="startGame()">開始遊戲</button>
</div>

<!-- 4️⃣ 遊戲 -->
<div id="gameScreen" class="screen">
  <h2 id="turnText"></h2>
  <div id="board" class="board"></div>
</div>

<button id="diceBtn" onclick="rollDice()">🎲</button>

<script>

let players = [];
let current = 0;
let count = 2;

const questions = [
"車禍是什麼時候發生的？",
"車禍大概幾點發生？",
"車禍是在哪裡發生的？",
"你騎機車還是開車？",
"車禍是怎麼發生的？"
];

document.getElementById("startBtn").onclick = ()=>{
  show("selectScreen");
};

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function selectPlayers(n){
  count = n;
  let html="";
  for(let i=0;i<n;i++){
    html += `<input placeholder="玩家${i+1}" id="p${i}"><br>`;
  }
  document.getElementById("nameInputs").innerHTML = html;
  show("nameScreen");
}

function startGame(){
  players=[];
  for(let i=0;i<count;i++){
    players.push({
      name:document.getElementById(`p${i}`).value || `玩家${i+1}`,
      pos:1
    });
  }
  drawBoard();
  update();
  show("gameScreen");
}

function drawBoard(){
  const b = document.getElementById("board");
  b.innerHTML="";
  for(let i=1;i<=25;i++){
    let cell = document.createElement("div");
    cell.className="cell";
    cell.id="c"+i;
    cell.innerHTML=i;
    b.appendChild(cell);
  }
}

function update(){
  document.querySelectorAll(".player").forEach(e=>e.remove());

  players.forEach((p,i)=>{
    let token = document.createElement("div");
    token.className="player";
    token.innerHTML="👮";
    document.getElementById("c"+p.pos).appendChild(token);
  });

  document.getElementById("turnText").innerText =
    "現在輪到："+players[current].name;
}

function rollDice(){
  let dice = Math.floor(Math.random()*6)+1;
  let p = players[current];

  p.pos += dice;
  if(p.pos>25) p.pos=25;

  alert("骰到："+dice);

  if(questions[p.pos%questions.length]){
    let q = questions[p.pos%questions.length];
    let correct = confirm(q + "\n\n答對按確定");
    if(!correct){
      p.pos -=1;
    }
  }

  if(p.pos==25){
    alert(p.name+" 贏了！");
  }

  current = (current+1)%players.length;

  update();
}

</script>

</body>
</html>
