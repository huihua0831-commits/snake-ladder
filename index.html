<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>警察做筆錄蛇梯遊戲</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
}

.board{
position:relative;
width:500px;
height:500px;
}

.board img{
position:absolute;
width:100%;
height:100%;
}

.grid{
position:absolute;
width:100%;
height:100%;
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:repeat(5,1fr);
}

.cell{
position:relative;
}

.token{
width:26px;
height:26px;
border-radius:50%;
border:3px solid white;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.p1{background:red}
.p2{background:blue}
.p3{background:green}
.p4{background:orange}

.panel{
width:260px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:left;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2563eb;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
max-width:400px;
}

</style>
</head>

<body>

<h2>警察做筆錄蛇梯遊戲</h2>

<div class="container">

<div class="board">

<img src="board.png">

<div class="grid" id="grid"></div>

</div>

<div class="panel">

<div>現在輪到： <b id="playerTurn">玩家1</b></div>

<p>骰子： <span id="dice">-</span></p>

<button onclick="rollDice()">擲骰子</button>
<button onclick="resetGame()">重新開始</button>

<h3>玩家位置</h3>

<div id="status"></div>

</div>

</div>


<div class="modal" id="taskModal">
<div class="modal-content">

<h3>任務</h3>

<p id="taskText"></p>

<button onclick="closeTask()">完成</button>

</div>
</div>


<script>

const grid=document.getElementById("grid")

for(let i=0;i<25;i++){
const cell=document.createElement("div")
cell.className="cell"
grid.appendChild(cell)
}

const cells=document.querySelectorAll(".cell")

const players=[
{pos:1,color:"p1"},
{pos:1,color:"p2"},
{pos:1,color:"p3"},
{pos:1,color:"p4"}
]

let currentPlayer=0

const tasks={
2:"請說：事故是在哪裡發生的？",
3:"用「發生」造句",
4:"請問對方：你是什麼時候看到事故的？",
5:"回答：事故大約是幾點發生？",
6:"用「記錄」說一句話",
7:"請問：當時天氣怎麼樣？",
8:"用「事故」造句",
9:"請描述事故經過",
10:"請問對方：有沒有受傷？",
11:"用「警察」造句",
12:"請說：我需要做筆錄",
13:"描述當時的情況",
14:"問對方：你看到什麼？",
15:"說一句完整的事故句子",
16:"用「地點」造句",
17:"描述事故發生的時間",
18:"請說一句完整報告",
19:"問對方是否需要幫助",
20:"請說事故經過",
21:"請問事故在哪條路",
22:"描述事故現場",
23:"用「報告」造句",
24:"說一句完整描述"
}

function renderTokens(){

cells.forEach(c=>c.innerHTML="")

players.forEach((p,i)=>{

const token=document.createElement("div")

token.className="token "+p.color

cells[p.pos-1].appendChild(token)

})

updateStatus()

}

function updateStatus(){

let text=""

players.forEach((p,i)=>{

text+=`玩家${i+1}：第 ${p.pos} 格<br>`

})

document.getElementById("status").innerHTML=text

}

function rollDice(){

const dice=Math.floor(Math.random()*6)+1

document.getElementById("dice").innerText=dice

let p=players[currentPlayer]

p.pos+=dice

if(p.pos>25)p.pos=25

renderTokens()

showTask(p.pos)

currentPlayer=(currentPlayer+1)%players.length

document.getElementById("playerTurn").innerText="玩家"+(currentPlayer+1)

}

function showTask(pos){

if(tasks[pos]){

document.getElementById("taskText").innerText=tasks[pos]

document.getElementById("taskModal").style.visibility="visible"

}

}

function closeTask(){

document.getElementById("taskModal").style.visibility="hidden"

}

function resetGame(){

players.forEach(p=>p.pos=1)

currentPlayer=0

renderTokens()

}

renderTokens()

</script>

</body>
</html>
