<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>警察做筆錄蛇梯遊戲</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
}

.board{
display:grid;
grid-template-columns:repeat(5,80px);
grid-template-rows:repeat(5,80px);
gap:2px;
background:#333;
padding:2px;
}

.cell{
background:white;
position:relative;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:bold;
}

.token{
width:22px;
height:22px;
border-radius:50%;
position:absolute;
bottom:6px;
right:6px;
border:2px solid white;
}

.p1{background:red}
.p2{background:blue}
.p3{background:green}
.p4{background:orange}

.panel{
width:260px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:left;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2563eb;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
max-width:400px;
}

</style>
</head>

<body>

<h2>警察做筆錄蛇梯遊戲</h2>

<div class="container">

<div id="board" class="board"></div>

<div class="panel">

<div>現在輪到： <b id="playerTurn">玩家1</b></div>

<p>骰子： <span id="dice">-</span></p>

<button onclick="rollDice()">擲骰子</button>
<button onclick="resetGame()">重新開始</button>

<h3>玩家位置</h3>
<div id="status"></div>

</div>

</div>

<div class="modal" id="taskModal">
<div class="modal-content">
<h3>任務</h3>
<p id="taskText"></p>
<button onclick="closeTask()">完成</button>
</div>
</div>

<script>

const board=document.getElementById("board")

const boardOrder=[
21,22,23,24,25,
20,19,18,17,16,
11,12,13,14,15,
10,9,8,7,6,
1,2,3,4,5
]

boardOrder.forEach(num=>{

const cell=document.createElement("div")

cell.className="cell"

cell.innerText=num

cell.dataset.num=num

board.appendChild(cell)

})

const cells=document.querySelectorAll(".cell")

const players=[
{pos:1,color:"p1"},
{pos:1,color:"p2"},
{pos:1,color:"p3"},
{pos:1,color:"p4"}
]

let currentPlayer=0

const snakes={
16:5,
18:11
}

const ladders={
3:14,
7:21
}

const tasks={
2:"請說：事故是在哪裡發生的？",
3:"描述事故發生的時間。",
4:"用「發生」造句。",
5:"事故大約幾點發生？",
6:"用「記錄」說一句話。",
7:"問對方：事故在哪裡發生？",
8:"用「事故」造句。",
9:"描述事故經過。",
10:"有沒有人受傷？",
11:"用「警察」造句。",
12:"請說：我需要做筆錄。",
13:"描述事故現場。",
14:"問對方：你看到什麼？",
15:"說一句完整事故句。",
16:"用「地點」造句。",
17:"描述事故時間。",
18:"做一個簡短報告。",
19:"問對方是否需要幫助。",
20:"說一句事故描述。",
21:"事故在哪條路？",
22:"描述事故現場情況。",
23:"用「報告」造句。",
24:"說一句完整描述。"
}

function renderTokens(){

cells.forEach(c=>{

c.querySelectorAll(".token").forEach(t=>t.remove())

})

players.forEach((p,i)=>{

const token=document.createElement("div")

token.className="token "+p.color

const cell=[...cells].find(c=>c.dataset.num==p.pos)

cell.appendChild(token)

})

updateStatus()

}

function updateStatus(){

let text=""

players.forEach((p,i)=>{

text+=`玩家${i+1}：第 ${p.pos} 格<br>`

})

document.getElementById("status").innerHTML=text

}

function rollDice(){

const dice=Math.floor(Math.random()*6)+1

document.getElementById("dice").innerText=dice

let p=players[currentPlayer]

p.pos+=dice

if(p.pos>25)p.pos=25

checkSnakeOrLadder(p)

renderTokens()

showTask(p.pos)

if(p.pos==25){
alert("玩家"+(currentPlayer+1)+"獲勝！")
}

currentPlayer=(currentPlayer+1)%players.length

document.getElementById("playerTurn").innerText="玩家"+(currentPlayer+1)

}

function checkSnakeOrLadder(player){

if(snakes[player.pos]){

player.pos=snakes[player.pos]

alert("🐍 踩到蛇，滑下去！")

}

if(ladders[player.pos]){

player.pos=ladders[player.pos]

alert("🪜 爬上梯子！")

}

}

function showTask(pos){

if(tasks[pos]){

document.getElementById("taskText").innerText=tasks[pos]

document.getElementById("taskModal").style.visibility="visible"

}

}

function closeTask(){

document.getElementById("taskModal").style.visibility="hidden"

}

function resetGame(){

players.forEach(p=>p.pos=1)

currentPlayer=0

renderTokens()

}

renderTokens()

</script>

</body>
</html>
