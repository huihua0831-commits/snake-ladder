<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>警察做筆錄蛇梯遊戲</title>

<style>

body{
font-family:"Noto Sans TC","Microsoft JhengHei";
background:#eef3fb;
text-align:center;
margin:0;
padding:20px;
}

h1{
margin-bottom:10px;
}

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:640px 1fr;
gap:24px;
}

.board-wrap{
position:relative;
width:600px;
height:600px;
margin:auto;
}

#board{
width:600px;
height:600px;
background-image:url('board.png');
background-size:cover;
background-position:center;
border-radius:10px;
}

.player{
width:36px;
height:36px;
border-radius:50%;
position:absolute;
border:3px solid white;
box-shadow:0 4px 10px rgba(0,0,0,.3);
transition:.35s;
}

#p1{background:#ef4444}
#p2{background:#3b82f6}
#p3{background:#22c55e}
#p4{background:#f59e0b}

button{
padding:12px 18px;
font-size:16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
margin:4px;
}

button.secondary{
background:#64748b;
}

.card{
background:white;
padding:16px;
border-radius:16px;
margin-bottom:16px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
text-align:left;
}

.big{
font-size:26px;
font-weight:800;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
opacity:0;
transition:.2s;
}

.modal.show{
visibility:visible;
opacity:1;
}

.modal-content{
background:white;
padding:28px;
border-radius:16px;
max-width:420px;
text-align:center;
}

.modal-title{
font-size:22px;
font-weight:800;
}

.modal-task{
font-size:18px;
margin:10px 0;
}

.modal-sample{
background:#f3f6fb;
padding:10px;
border-radius:10px;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<h1>警察做筆錄蛇梯遊戲</h1>

<div class="container">

<div class="board-wrap">

<div id="board"></div>

<div id="p1" class="player"></div>
<div id="p2" class="player"></div>
<div id="p3" class="player"></div>
<div id="p4" class="player"></div>

</div>

<div>

<div class="card">

現在輪到： <span id="current" class="big">玩家1</span>

<br><br>

骰子： <span id="dice" class="big">🎲</span>

<br><br>

<button onclick="rollDice()">擲骰子</button>
<button class="secondary" onclick="resetGame()">重新開始</button>

</div>

<div class="card">
<h3>玩家位置</h3>
<div id="status"></div>
</div>

</div>

</div>

<div id="taskModal" class="modal">
<div class="modal-content">

<div id="taskType" class="modal-title">任務</div>
<div id="taskText" class="modal-task"></div>

<div id="taskSample" class="modal-sample"></div>

<button onclick="showAnswer()">老師顯示答案</button>
<button onclick="closeModal()">學生回答完成</button>

</div>
</div>

<script>

const size=600
const grid=5
const cell=size/grid

const snakes={16:6,18:8,24:12}
const ladders={3:11,5:15,7:20}

const questionBank=[

{text:"車禍是什麼時候發生的？",sample:"今天下午三點發生的。"},
{text:"事故是在哪裡發生的？",sample:"在中山路和和平路的路口。"},
{text:"當時你在做什麼？",sample:"我正在騎機車。"},
{text:"有人受傷嗎？",sample:"有一個人手受傷。"},
{text:"你的車號是多少？",sample:"我的車號是ABC123。"},
{text:"事故發生後你做了什麼？",sample:"我先停車，然後報警。"},
{text:"你有拍照嗎？",sample:"有，我拍了照片。"},
{text:"對方的車號是多少？",sample:"XYZ888。"},
{text:"事故是怎麼發生的？",sample:"對方突然右轉。"},
{text:"當時路上車多嗎？",sample:"當時車很多。"},
{text:"天氣怎麼樣？",sample:"當時正在下雨。"},
{text:"你有打電話報警嗎？",sample:"有，我馬上報警。"},
{text:"事故發生的原因是什麼？",sample:"可能是沒有看到我。"}
]

function randomQuestion(){
return questionBank[Math.floor(Math.random()*questionBank.length)]
}

const players=[
{name:"玩家1",pos:1,el:document.getElementById("p1"),offsetX:20,offsetY:20},
{name:"玩家2",pos:1,el:document.getElementById("p2"),offsetX:60,offsetY:20},
{name:"玩家3",pos:1,el:document.getElementById("p3"),offsetX:20,offsetY:60},
{name:"玩家4",pos:1,el:document.getElementById("p4"),offsetX:60,offsetY:60}
]

let turn=0
let gameOver=false

function coord(n){

const row=Math.floor((n-1)/grid)

let col=(n-1)%grid

if(row%2==1){
col=grid-1-col
}

return{
x:col*cell,
y:size-cell-row*cell
}

}

function draw(){

players.forEach(p=>{

const c=coord(p.pos)

p.el.style.left=(c.x+p.offsetX)+"px"
p.el.style.top=(c.y+p.offsetY)+"px"

})

}

function updateStatus(){

status.innerHTML=""

players.forEach(p=>{

const d=document.createElement("div")

d.textContent=p.name+"：第 "+p.pos+" 格"

status.appendChild(d)

})

}

let currentQuestion=null

function showTask(){

currentQuestion=randomQuestion()

taskText.innerText=currentQuestion.text

taskSample.innerText="示例："+currentQuestion.sample

taskSample.style.display="none"

taskModal.classList.add("show")

}

function showAnswer(){

taskSample.style.display="block"

}

function closeModal(){

taskModal.classList.remove("show")

}

function rollDice(){

if(gameOver)return

const p=players[turn]

const dice=Math.floor(Math.random()*6)+1

diceEl.innerText="🎲 "+dice

p.pos+=dice

if(p.pos>25)p.pos=25

if(ladders[p.pos])p.pos=ladders[p.pos]

if(snakes[p.pos])p.pos=snakes[p.pos]

draw()

updateStatus()

showTask()

if(p.pos>=25){

gameOver=true

setTimeout(()=>alert(p.name+" 獲勝"),300)

}

turn=(turn+1)%players.length

current.innerText=players[turn].name

}

function resetGame(){

players.forEach(p=>p.pos=1)

turn=0

gameOver=false

draw()

updateStatus()

current.innerText="玩家1"

dice.innerText="🎲"

}

const status=document.getElementById("status")
const diceEl=document.getElementById("dice")

resetGame()

</script>

</body>
</html>
