<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>職場華語蛇梯遊戲</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
.center{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;}
.cover{background:url("cover.png") center/cover no-repeat;}
.play-btn{font-size:30px;padding:20px 40px;border-radius:20px;background:orange;border:none;cursor:pointer;}

.panel{background:#1e293b;padding:30px;border-radius:20px;}
.board{display:grid;grid-template-columns:repeat(5,100px);gap:10px;}
.cell{width:100px;height:100px;background:#334155;border-radius:15px;display:flex;justify-content:center;align-items:center;font-size:20px;position:relative;}
.player{position:absolute;bottom:5px;font-size:20px;}

.dice-btn{position:fixed;bottom:20px;right:20px;font-size:30px;padding:15px;border-radius:15px;background:white;color:black;cursor:pointer;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;}
.modal-box{background:white;color:black;padding:30px;border-radius:20px;text-align:center;width:400px;}
.big{font-size:28px;margin-bottom:20px;}
</style>
</head>

<body>

<!-- 首頁 -->
<div id="p1" class="center cover">
<button class="play-btn" onclick="go(2)">開始</button>
</div>

<!-- 人數 -->
<div id="p2" class="center" style="display:none;">
<div class="panel">
<h2>選人數</h2>
<button onclick="setP(2)">👮👮</button>
<button onclick="setP(3)">👮👮👮</button>
<button onclick="setP(4)">👮👮👮👮</button>
</div>
</div>

<!-- 名字 -->
<div id="p3" class="center" style="display:none;">
<div class="panel">
<h2>輸入名字</h2>
<div id="names"></div>
<button onclick="start()">開始遊戲</button>
</div>
</div>

<!-- 遊戲 -->
<div id="game" style="display:none;padding:20px;">
<h2 id="turn"></h2>
<div class="board" id="board"></div>
</div>

<div class="dice-btn" onclick="dice()">🎲</div>

<!-- 骰子 -->
<div class="modal" id="diceM">
<div class="modal-box">
<div class="big" id="diceNum"></div>
<button onclick="nextMove()">確定</button>
</div>
</div>

<!-- 任務 -->
<div class="modal" id="taskM">
<div class="modal-box">
<div class="big" id="q"></div>
<div id="btns"></div>
</div>
</div>

<script>
let pc=0, players=[], pos=[], turn=0, diceVal=0;

/* ===== 52題 ===== */
const bank=[
// 問答
"車禍是什麼時候發生的？","車禍大概幾點發生？","車禍是在哪裡發生的？",
"車禍是在中山路和和平路的路口發生的嗎？","你騎機車還是開車？對方呢？",
"你的車號是多少？","對方的車號是多少？","車禍是怎麼發生的？",
"你那個時候要直走、右轉還是左轉？","對方的車是從哪裡來的？",
"有人受傷嗎？","車子有損壞嗎？","事故發生以後，你做了什麼？",

// 造句
"造句：車禍","造句：發生","造句：路口","造句：十字路口","造句：當事人",
"造句：車種","造句：車號","造句：直走","造句：右轉","造句：左轉",
"造句：等紅燈","造句：停在路邊","造句：擦撞","造句：突然","造句：巷子",
"造句：開出來","造句：來不及","造句：煞車","造句：撞到","造句：超車",
"造句：速度","造句：倒車","造句：摔倒","造句：撞凹","造句：倒",
"造句：按喇叭","造句：停下來","造句：受傷","造句：擦傷","造句：其他",
"造句：骨折","造句：流血","造句：車燈","造句：壞","造句：對方",
"造句：車門","造句：拍照","造句：報警","造句：救護車"
];

let pool=[...bank];

function getQ(){
 if(pool.length===0) pool=[...bank];
 let i=Math.floor(Math.random()*pool.length);
 let q=pool[i];
 pool.splice(i,1);
 return q;
}

/* ===== 頁面 ===== */
function go(n){
 document.querySelectorAll("body > div").forEach(d=>d.style.display="none");
 document.getElementById("p"+n).style.display="flex";
}

/* ===== 玩家 ===== */
function setP(n){
 pc=n;
 let html="";
 for(let i=0;i<n;i++){
  html+=`<input id="n${i}" placeholder="玩家${i+1}"><br>`;
 }
 document.getElementById("names").innerHTML=html;
 go(3);
}

function start(){
 players=[]; pos=[];
 for(let i=0;i<pc;i++){
  players.push(document.getElementById("n"+i).value||("玩家"+(i+1)));
  pos.push(1);
 }
 document.getElementById("game").style.display="block";
 draw();
}

/* ===== 棋盤 ===== */
function draw(){
 let b=document.getElementById("board");
 b.innerHTML="";
 for(let i=1;i<=25;i++){
  let c=document.createElement("div");
  c.className="cell";
  c.innerHTML=i;

  players.forEach((p,idx)=>{
   if(pos[idx]==i){
    c.innerHTML+=`<div class="player">👮</div>`;
   }
  });

  b.appendChild(c);
 }
 document.getElementById("turn").innerText="輪到："+players[turn];
}

/* ===== 骰子 ===== */
function dice(){
 diceVal=Math.floor(Math.random()*6)+1;
 document.getElementById("diceNum").innerText="🎲 "+diceVal;
 document.getElementById("diceM").style.display="flex";
}

function nextMove(){
 document.getElementById("diceM").style.display="none";

 pos[turn]+=diceVal;
 if(pos[turn]>25) pos[turn]=25;

 task();
}

/* ===== 任務 ===== */
function task(){
 let q=getQ();
 document.getElementById("q").innerText=q;

 let btns=document.getElementById("btns");

 // 判斷題型
 if(q.includes("造句")){
   btns.innerHTML=`<button onclick="next()">完成</button>`;
 }else{
   btns.innerHTML=`
   <button onclick="correct()">✔答對</button>
   <button onclick="wrong()">✖答錯</button>`;
 }

 document.getElementById("taskM").style.display="flex";
}

function correct(){
 document.getElementById("taskM").style.display="none";
 next();
}

function wrong(){
 pos[turn]--;
 document.getElementById("taskM").style.display="none";
 next();
}

function next(){
 if(pos[turn]>=25){
   alert(players[turn]+" 贏了！");
   location.reload();
 }

 turn=(turn+1)%pc;
 draw();
}
</script>

</body>
</html>
