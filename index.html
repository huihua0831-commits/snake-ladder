<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>職場華語蛇梯遊戲</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* ===== 共用 ===== */
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* ===== 首頁 ===== */
.cover{
  background:url("cover.png") center/cover no-repeat;
}

.play-btn{
  font-size:30px;
  padding:20px 40px;
  border-radius:20px;
  background:orange;
  border:none;
  cursor:pointer;
}

/* ===== 面板 ===== */
.panel{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
}

/* ===== 棋盤 ===== */
.board{
  display:grid;
  grid-template-columns:repeat(5,100px);
  gap:10px;
}

.cell{
  width:100px;
  height:100px;
  background:#334155;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  position:relative;
}

.player{
  position:absolute;
  bottom:5px;
}

/* ===== 骰子 ===== */
.dice-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:30px;
  padding:15px;
  border-radius:15px;
  background:white;
  color:black;
  cursor:pointer;
}

/* ===== 彈窗 ===== */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

.big-text{
  font-size:28px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<!-- ===== 首頁 ===== -->
<div id="page1" class="center cover">
  <button class="play-btn" onclick="goPage(2)">▶ 開始</button>
</div>

<!-- ===== 選人數 ===== -->
<div id="page2" class="center" style="display:none;">
  <div class="panel">
    <h2>選擇玩家人數</h2>
    <button onclick="setPlayers(2)">👮👮 2人</button>
    <button onclick="setPlayers(3)">👮👮👮 3人</button>
    <button onclick="setPlayers(4)">👮👮👮👮 4人</button>
  </div>
</div>

<!-- ===== 輸入名字 ===== -->
<div id="page3" class="center" style="display:none;">
  <div class="panel">
    <h2>輸入玩家名字</h2>
    <div id="inputs"></div>
    <button onclick="startGame()">開始遊戲</button>
  </div>
</div>

<!-- ===== 遊戲 ===== -->
<div id="game" style="display:none; padding:20px;">
  <h2 id="turn"></h2>
  <div class="board" id="board"></div>
</div>

<div class="dice-btn" onclick="rollDice()">🎲</div>

<!-- ===== 骰子彈窗 ===== -->
<div class="modal" id="diceModal">
  <div class="modal-box">
    <div class="big-text" id="diceResult"></div>
    <button onclick="closeDice()">確定</button>
  </div>
</div>

<!-- ===== 問題彈窗 ===== -->
<div class="modal" id="taskModal">
  <div class="modal-box">
    <div class="big-text" id="question"></div>
    <button onclick="answer(true)">✔ 答對</button>
    <button onclick="answer(false)">✖ 答錯</button>
  </div>
</div>

<script>
let playerCount=0;
let players=[];
let pos=[];
let turn=0;

const questions=[
"車禍是什麼時候發生的？",
"車禍大概幾點發生？",
"車禍在哪裡發生？",
"你騎機車還是開車？",
"你的車號是多少？"
];

function goPage(n){
  document.querySelectorAll("body > div").forEach(d=>d.style.display="none");
  document.getElementById("page"+n).style.display="flex";
}

function setPlayers(n){
  playerCount=n;
  let html="";
  for(let i=0;i<n;i++){
    html+=`<input id="p${i}" placeholder="玩家${i+1}"><br>`;
  }
  document.getElementById("inputs").innerHTML=html;
  goPage(3);
}

function startGame(){
  players=[];
  pos=[];
  for(let i=0;i<playerCount;i++){
    players.push(document.getElementById("p"+i).value || ("玩家"+(i+1)));
    pos.push(1);
  }
  goGame();
}

function goGame(){
  document.querySelectorAll("body > div").forEach(d=>d.style.display="none");
  document.getElementById("game").style.display="block";
  drawBoard();
  updateTurn();
}

function drawBoard(){
  let b=document.getElementById("board");
  b.innerHTML="";
  for(let i=1;i<=25;i++){
    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerHTML=i;

    players.forEach((p,idx)=>{
      if(pos[idx]==i){
        cell.innerHTML+=`<div class="player">👮</div>`;
      }
    });

    b.appendChild(cell);
  }
}

function updateTurn(){
  document.getElementById("turn").innerText="輪到："+players[turn];
}

function rollDice(){
  let num=Math.floor(Math.random()*6)+1;
  document.getElementById("diceResult").innerText="🎲 "+num;
  document.getElementById("diceModal").style.display="flex";
  window.currentDice=num;
}

function closeDice(){
  document.getElementById("diceModal").style.display="none";

  pos[turn]+=window.currentDice;
  if(pos[turn]>25) pos[turn]=25;

  showQuestion();
}

function showQuestion(){
  let q=questions[Math.floor(Math.random()*questions.length)];
  document.getElementById("question").innerText=q;
  document.getElementById("taskModal").style.display="flex";
}

function answer(correct){
  document.getElementById("taskModal").style.display="none";

  if(!correct){
    pos[turn]-=1;
  }

  if(pos[turn]>=25){
    alert(players[turn]+" 勝利！");
    location.reload();
  }

  turn=(turn+1)%playerCount;
  drawBoard();
  updateTurn();
}
</script>

</body>
</html>
