<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>職場華語蛇梯遊戲</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#6ecf68,#3fa34d);
  overflow:hidden;
}

/* 畫面切換 */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.active{display:flex;}

/* 開場 */
.title{
  font-size:60px;
  color:white;
  text-shadow:3px 3px 0 #000;
}

.startBtn{
  margin-top:30px;
  font-size:50px;
  background:#ff914d;
  border-radius:20px;
}

/* 卡片 */
.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* 棋盤 */
.board{
  display:grid;
  grid-template-columns:repeat(5,90px);
  gap:10px;
}

.cell{
  width:90px;
  height:90px;
  background:#fff8dc;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
  position:relative;
}

/* 玩家 */
.player{
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:25px;
}

/* 骰子 */
#diceBtn{
  position:fixed;
  bottom:30px;
  right:30px;
  font-size:50px;
  background:#ff914d;
  border-radius:50%;
  padding:20px;
}

/* 視窗 */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalBox{
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:60%;
}

.bigText{
  font-size:28px;
  margin-bottom:20px;
}

</style>
</head>

<body>

<!-- 開場 -->
<div id="startScreen" class="screen active">
  <div class="title">🐍 蛇梯 🪜</div>
  <button class="startBtn" onclick="show('selectScreen')">▶️</button>
</div>

<!-- 選玩家 -->
<div id="selectScreen" class="screen">
  <div class="card">
    <h2>選擇玩家人數</h2>
    <button onclick="selectPlayers(2)">2人</button>
    <button onclick="selectPlayers(3)">3人</button>
    <button onclick="selectPlayers(4)">4人</button>
  </div>
</div>

<!-- 輸入名字 -->
<div id="nameScreen" class="screen">
  <div class="card">
    <h2>輸入玩家名稱</h2>
    <div id="nameInputs"></div>
    <br>
    <button onclick="startGame()">開始遊戲</button>
  </div>
</div>

<!-- 遊戲 -->
<div id="gameScreen" class="screen">
  <h2 id="turnText"></h2>
  <div id="board" class="board"></div>
</div>

<button id="diceBtn" onclick="rollDice()">🎲</button>

<!-- 任務視窗 -->
<div id="modal" class="modal">
  <div class="modalBox">
    <div id="question" class="bigText"></div>
    <button onclick="answer(true)">答對</button>
    <button onclick="answer(false)">答錯</button>
  </div>
</div>

<script>

let players=[];
let current=0;
let pendingMove=0;

const questions=[
"車禍是什麼時候發生的？",
"車禍在哪裡發生？",
"你騎車還是開車？",
"車禍怎麼發生的？",
"有人受傷嗎？"
];

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function selectPlayers(n){
  let html="";
  for(let i=0;i<n;i++){
    html+=`<input id="p${i}" placeholder="玩家${i+1}"><br>`;
  }
  document.getElementById("nameInputs").innerHTML=html;
  show("nameScreen");
}

function startGame(){
  players=[];
  for(let i=0;i<document.querySelectorAll("#nameInputs input").length;i++){
    players.push({
      name:document.getElementById(`p${i}`).value || `玩家${i+1}`,
      pos:1,
      icon:["🔴","🔵","🟢","🟡"][i]
    });
  }
  drawBoard();
  update();
  show("gameScreen");
}

function drawBoard(){
  const b=document.getElementById("board");
  b.innerHTML="";
  for(let i=1;i<=25;i++){
    let cell=document.createElement("div");
    cell.className="cell";
    cell.id="c"+i;
    cell.innerHTML=i;
    b.appendChild(cell);
  }
}

function update(){
  document.querySelectorAll(".player").forEach(p=>p.remove());

  players.forEach(p=>{
    let token=document.createElement("div");
    token.className="player";
    token.innerHTML=p.icon+"👮";
    document.getElementById("c"+p.pos).appendChild(token);
  });

  document.getElementById("turnText").innerText="輪到："+players[current].name;
}

function rollDice(){
  let dice=Math.floor(Math.random()*6)+1;
  pendingMove=dice;

  let q=questions[Math.floor(Math.random()*questions.length)];
  document.getElementById("question").innerText="骰子："+dice+" \n\n"+q;
  document.getElementById("modal").style.display="flex";
}

function answer(correct){
  document.getElementById("modal").style.display="none";

  let p=players[current];

  if(correct){
    p.pos+=pendingMove;
  }else{
    p.pos+=Math.max(1,pendingMove-1);
  }

  if(p.pos>25) p.pos=25;

  if(p.pos==25){
    alert(p.name+" 贏了！");
  }

  current=(current+1)%players.length;

  update();
}

</script>

</body>
</html>
